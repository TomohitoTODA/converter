<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Converter</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/svg2pdf.js@2.2.1/dist/svg2pdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f5f5f7;
      color: #1d1d1f;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 20px;
    }

    h1 { font-size: 2rem; font-weight: 700; margin-bottom: 8px; letter-spacing: -0.5px; }

    .subtitle { color: #6e6e73; margin-bottom: 24px; font-size: 0.95rem; }

    #build-time {
      position: fixed; top: 12px; right: 16px;
      font-size: 0.72rem; color: #aeaeb2;
      font-family: monospace;
    }

    .container { width: 100%; max-width: 720px; }

    /* ── Mode tabs ───────────────────────────────────────────────── */
    .mode-tabs {
      display: flex;
      background: #e5e5ea;
      border-radius: 10px;
      padding: 3px;
      margin-bottom: 24px;
    }
    .mode-tab {
      flex: 1;
      padding: 8px 0;
      border: none;
      background: transparent;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.9rem;
      font-weight: 500;
      color: #6e6e73;
      transition: background 0.15s, color 0.15s, box-shadow 0.15s;
    }
    .mode-tab.active {
      background: #fff;
      color: #1d1d1f;
      box-shadow: 0 1px 4px rgba(0,0,0,0.15);
    }

    /* ── Convert mode ────────────────────────────────────────────── */
    #dropzone {
      border: 2px dashed #c7c7cc;
      border-radius: 16px;
      padding: 48px 24px;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
      background: #fff;
      margin-bottom: 20px;
    }
    #dropzone.hover { border-color: #0071e3; background: #f0f6ff; }
    #dropzone .icon { font-size: 2.2rem; margin-bottom: 12px; }
    #dropzone .main-text { font-size: 0.95rem; color: #3a3a3c; margin-bottom: 6px; }
    #dropzone .main-text strong { color: #0071e3; }
    #dropzone .sub-text { font-size: 0.82rem; color: #8e8e93; }
    #dropzone.locked { border-color: #34c759; border-style: solid; }
    #fileInput { display: none; }

    #outputSelector {
      background: #fff;
      border-radius: 12px;
      padding: 16px 20px;
      margin-bottom: 16px;
      display: none;
      align-items: center;
      gap: 16px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
      flex-wrap: wrap;
    }
    #outputSelector label.heading {
      font-size: 0.85rem;
      font-weight: 600;
      color: #6e6e73;
      white-space: nowrap;
    }
    .radio-group { display: flex; gap: 10px; flex-wrap: wrap; }
    .radio-group label {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 7px 16px;
      border-radius: 99px;
      border: 1.5px solid #d1d1d6;
      cursor: pointer;
      font-size: 0.9rem;
      font-weight: 500;
      transition: border-color 0.15s, background 0.15s, color 0.15s;
      user-select: none;
    }
    .radio-group input[type="radio"] { display: none; }
    .radio-group label.selected {
      border-color: #0071e3;
      background: #0071e3;
      color: #fff;
    }

    #fileList { display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; }

    #sortBtn {
      margin-left: auto;
      font-size: 0.82rem;
      padding: 5px 12px;
      border-radius: 8px;
      border: 1.5px solid #d1d1d6;
      background: #fff;
      cursor: pointer;
      color: #3a3a3c;
      font-weight: 500;
      transition: background 0.15s, border-color 0.15s;
      white-space: nowrap;
    }
    #sortBtn:hover { background: #f5f5f7; border-color: #aeaeb2; }

    .file-item {
      background: #fff;
      border-radius: 12px;
      padding: 12px 16px;
      display: flex;
      align-items: center;
      gap: 14px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
      cursor: default;
      user-select: none;
      transition: box-shadow 0.15s, opacity 0.15s;
    }
    .file-item.dragging { opacity: 0.4; }
    .file-item.drag-over { box-shadow: 0 0 0 2px #0071e3; }

    .drag-handle {
      cursor: grab;
      padding: 4px 2px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      opacity: 0.3;
      transition: opacity 0.15s;
    }
    .drag-handle:hover { opacity: 0.7; }
    .drag-handle:active { cursor: grabbing; }

    .file-thumb {
      width: 48px; height: 48px;
      border-radius: 8px;
      background: #f5f5f7;
      display: flex; align-items: center; justify-content: center;
      overflow: hidden; flex-shrink: 0;
    }
    .file-thumb img { width: 100%; height: 100%; object-fit: contain; }

    .file-info { flex: 1; min-width: 0; }
    .file-name { font-size: 0.9rem; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .file-size { font-size: 0.78rem; color: #6e6e73; margin-top: 2px; }

    .page-num { font-size: 0.78rem; color: #8e8e93; flex-shrink: 0; }

    .remove-btn {
      background: none; border: none;
      color: #8e8e93; cursor: pointer;
      font-size: 1.1rem; padding: 4px;
      border-radius: 50%; line-height: 1;
      transition: color 0.15s, background 0.15s;
      flex-shrink: 0;
    }
    .remove-btn:hover { color: #ff3b30; background: #fff0ef; }

    .type-badge {
      font-size: 0.72rem; font-weight: 700;
      padding: 2px 7px; border-radius: 4px;
      background: #f5f5f7; color: #6e6e73;
      flex-shrink: 0; letter-spacing: 0.03em;
    }
    .type-badge.svg { background: #fff3e0; color: #e65100; }
    .type-badge.png { background: #e8f5e9; color: #2e7d32; }
    .type-badge.jpg { background: #e3f2fd; color: #1565c0; }
    .type-badge.pdf { background: #fce4ec; color: #c62828; }

    .actions { display: flex; gap: 12px; align-items: center; margin-bottom: 20px; }

    #convertBtn {
      flex: 1; padding: 14px;
      background: #0071e3; color: #fff;
      border: none; border-radius: 12px;
      font-size: 1rem; font-weight: 600;
      cursor: pointer; transition: background 0.15s;
    }
    #convertBtn:hover:not(:disabled) { background: #0077ed; }
    #convertBtn:disabled { background: #c7c7cc; cursor: not-allowed; }

    #clearBtn {
      padding: 14px 20px;
      background: #fff; color: #ff3b30;
      border: 1.5px solid #ffd7d5; border-radius: 12px;
      font-size: 0.95rem; font-weight: 500;
      cursor: pointer; transition: background 0.15s;
      white-space: nowrap;
    }
    #clearBtn:hover:not(:disabled) { background: #fff0ef; }
    #clearBtn:disabled { opacity: 0.4; cursor: not-allowed; }

    #progress { display: none; }
    .progress-label { font-size: 0.85rem; color: #6e6e73; margin-bottom: 8px; }
    .progress-bar-wrap { background: #e5e5ea; border-radius: 99px; height: 6px; overflow: hidden; }
    .progress-bar { height: 100%; background: #0071e3; border-radius: 99px; width: 0%; transition: width 0.2s; }

    /* ── Organize mode ───────────────────────────────────────────── */
    #orgDropzone {
      border: 2px dashed #c7c7cc;
      border-radius: 12px;
      padding: 20px 24px;
      text-align: center;
      cursor: pointer;
      background: #fff;
      margin-bottom: 14px;
      transition: border-color 0.2s, background 0.2s;
      font-size: 0.9rem;
      color: #3a3a3c;
    }
    #orgDropzone.hover { border-color: #0071e3; background: #f0f6ff; }
    #orgDropzone strong { color: #0071e3; }
    #orgFileInput { display: none; }

    #orgToolbar {
      background: #fff;
      border-radius: 12px;
      padding: 10px 14px;
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 14px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
      flex-wrap: wrap;
    }
    .org-btn {
      display: flex; align-items: center; gap: 5px;
      padding: 7px 12px;
      border: 1.5px solid #d1d1d6; border-radius: 8px;
      background: #fff; cursor: pointer;
      font-size: 0.83rem; font-weight: 500;
      color: #3a3a3c;
      transition: background 0.15s, border-color 0.15s;
      white-space: nowrap;
    }
    .org-btn:hover:not(:disabled) { background: #f5f5f7; border-color: #aeaeb2; }
    .org-btn:disabled { opacity: 0.35; cursor: not-allowed; }
    .org-btn.primary { background: #0071e3; border-color: #0071e3; color: #fff; }
    .org-btn.primary:hover:not(:disabled) { background: #0077ed; }
    .org-btn.danger { border-color: #ffd7d5; color: #ff3b30; }
    .org-btn.danger:hover:not(:disabled) { background: #fff0ef; }
    .org-sep { width: 1px; height: 22px; background: #e5e5ea; flex-shrink: 0; margin: 0 2px; }
    #orgStatus { font-size: 0.82rem; color: #6e6e73; flex: 1; min-width: 60px; }
    .org-export-actions { display: flex; flex-direction: column; gap: 8px; margin-top: 14px; }
    .org-export-item { display: flex; gap: 8px; align-items: center; }
    .org-export-item .org-btn { white-space: nowrap; }
    .org-export-name {
      flex: 1; padding: 7px 11px;
      border: 1.5px solid #d1d1d6; border-radius: 8px;
      font-size: 0.83rem; color: #3a3a3c; outline: none;
      background: #fff; transition: border-color 0.15s;
    }
    .org-export-name::placeholder { color: #aeaeb2; }
    .org-export-name:focus { border-color: #0071e3; }

    #orgGrid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
      gap: 14px;
      padding: 18px;
      background: #ebebf0;
      border-radius: 12px;
      min-height: 180px;
    }
    .org-empty {
      grid-column: 1 / -1;
      text-align: center;
      color: #aeaeb2;
      padding: 48px 0;
      font-size: 0.9rem;
    }
    .org-card {
      background: #fff;
      border-radius: 8px;
      padding: 8px 8px 10px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.10);
      cursor: pointer;
      user-select: none;
      border: 2px solid transparent;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 7px;
      transition: box-shadow 0.15s, border-color 0.15s;
      position: relative;
    }
    .org-card:hover { box-shadow: 0 4px 14px rgba(0,0,0,0.16); }
    .org-card.selected { border-color: #0071e3; }
    .org-card.selected::after {
      content: '✓';
      position: absolute; top: 5px; right: 6px;
      width: 18px; height: 18px;
      background: #0071e3; color: #fff;
      border-radius: 50%;
      font-size: 11px; line-height: 18px;
      text-align: center;
    }
    .org-card.dragging { opacity: 0.3; }
    .org-card.drag-over { border-color: #0071e3; background: #f0f6ff; }

    .org-thumb {
      width: 100%;
      aspect-ratio: 3/4;
      background: #f5f5f7;
      border-radius: 4px;
      overflow: hidden;
      display: flex; align-items: center; justify-content: center;
    }
    .org-thumb img {
      max-width: 100%; max-height: 100%;
      object-fit: contain; display: block;
      transition: transform 0.2s;
    }
    .org-page-num { font-size: 0.72rem; color: #6e6e73; font-weight: 500; }
    .org-progress { margin-top: 14px; }

    /* ── Compress mode ───────────────────────────────────────────── */
    #cmpDropzone {
      border: 2px dashed #c7c7cc;
      border-radius: 16px;
      padding: 48px 24px;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
      background: #fff;
      margin-bottom: 20px;
    }
    #cmpDropzone.hover { border-color: #0071e3; background: #f0f6ff; }
    #cmpDropzone .icon { font-size: 2.2rem; margin-bottom: 12px; }
    #cmpDropzone .main-text { font-size: 0.95rem; color: #3a3a3c; margin-bottom: 6px; }
    #cmpDropzone .main-text strong { color: #0071e3; }
    #cmpDropzone .sub-text { font-size: 0.82rem; color: #8e8e93; }
    #cmpFileInput { display: none; }

    .cmp-options-row {
      background: #fff;
      border-radius: 12px;
      padding: 14px 20px;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 16px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
      flex-wrap: wrap;
    }
    .quality-slider { flex: 1; min-width: 100px; accent-color: #0071e3; cursor: pointer; }
    .quality-value { font-size: 0.9rem; font-weight: 600; min-width: 42px; text-align: right; }

    #cmpBtn {
      flex: 1; padding: 14px;
      background: #34c759; color: #fff;
      border: none; border-radius: 12px;
      font-size: 1rem; font-weight: 600;
      cursor: pointer; transition: background 0.15s;
    }
    #cmpBtn:hover:not(:disabled) { background: #30b350; }
    #cmpBtn:disabled { background: #c7c7cc; cursor: not-allowed; }

    #cmpClearBtn {
      padding: 14px 20px;
      background: #fff; color: #ff3b30;
      border: 1.5px solid #ffd7d5; border-radius: 12px;
      font-size: 0.95rem; font-weight: 500;
      cursor: pointer; transition: background 0.15s;
      white-space: nowrap;
    }
    #cmpClearBtn:hover:not(:disabled) { background: #fff0ef; }
    #cmpClearBtn:disabled { opacity: 0.4; cursor: not-allowed; }

    /* ── 4in1 mode ─────────────────────────────────────────────── */
    #nupDropzone {
      border: 2px dashed #c7c7cc;
      border-radius: 16px;
      padding: 48px 24px;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
      background: #fff;
      margin-bottom: 20px;
    }
    #nupDropzone.hover { border-color: #0071e3; background: #f0f6ff; }
    #nupDropzone .icon { font-size: 2.2rem; margin-bottom: 12px; }
    #nupDropzone .main-text { font-size: 0.95rem; color: #3a3a3c; margin-bottom: 6px; }
    #nupDropzone .main-text strong { color: #0071e3; }
    #nupDropzone .sub-text { font-size: 0.82rem; color: #8e8e93; }
    #nupFileInput { display: none; }

    #nupStatus {
      font-size: 0.88rem; color: #6e6e73;
      margin-bottom: 16px; text-align: center;
    }

    #nupPreviewGrid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 16px;
      margin-bottom: 20px;
    }

    .nup-output-card {
      background: #fff;
      border-radius: 12px;
      padding: 10px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
    }

    .nup-2x2-grid {
      width: 100%;
      display: grid;
      grid-template-columns: 1fr 1fr;
      grid-template-rows: 1fr 1fr;
      gap: 2px;
      background: #e5e5ea;
      border-radius: 6px;
      overflow: hidden;
    }

    .nup-cell {
      background: #f5f5f7;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      min-width: 0;
      min-height: 0;
    }
    .nup-cell img {
      width: 100%; height: 100%;
      object-fit: contain; display: block;
    }
    .nup-cell.empty { background: #ebebf0; }

    .nup-page-label {
      font-size: 0.72rem; color: #6e6e73;
      text-align: center; margin-top: 6px; font-weight: 500;
    }
    .nup-name-input {
      width: 100%; box-sizing: border-box;
      margin-top: 4px; padding: 3px 7px;
      font-size: 0.72rem; color: #3a3a3c;
      border: 1px solid transparent; border-radius: 6px;
      background: transparent; text-align: center;
      outline: none; transition: border-color 0.15s, background 0.15s;
    }
    .nup-name-input::placeholder { color: #aeaeb2; }
    .nup-name-input:hover { border-color: #d1d1d6; background: #f5f5f7; }
    .nup-name-input:focus { border-color: #0071e3; background: #fff; }

    #nupBtn {
      flex: 1; padding: 14px;
      background: #0071e3; color: #fff;
      border: none; border-radius: 12px;
      font-size: 1rem; font-weight: 600;
      cursor: pointer; transition: background 0.15s;
    }
    #nupBtn:hover:not(:disabled) { background: #0077ed; }
    #nupBtn:disabled { background: #c7c7cc; cursor: not-allowed; }

    #nupClearBtn {
      padding: 14px 20px;
      background: #fff; color: #ff3b30;
      border: 1.5px solid #ffd7d5; border-radius: 12px;
      font-size: 0.95rem; font-weight: 500;
      cursor: pointer; transition: background 0.15s;
      white-space: nowrap;
    }
    #nupClearBtn:hover:not(:disabled) { background: #fff0ef; }
    #nupClearBtn:disabled { opacity: 0.4; cursor: not-allowed; }

    /* ── Toast ───────────────────────────────────────────────────── */
    #toast {
      position: fixed; bottom: 32px; left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: #1d1d1f; color: #fff;
      padding: 10px 20px; border-radius: 99px;
      font-size: 0.88rem; opacity: 0;
      transition: opacity 0.2s, transform 0.2s;
      pointer-events: none; white-space: nowrap;
    }
    #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  </style>
</head>
<body>
  <div class="container">
    <h1>Converter</h1>
    <p class="subtitle" id="subtitle">SVG・PNG・JPG・PDFをドラッグして変換</p>

    <div class="mode-tabs">
      <button class="mode-tab active" id="tabConvert">変換</button>
      <button class="mode-tab" id="tabOrganize">整理・編集</button>
      <button class="mode-tab" id="tabCompress">圧縮</button>
      <button class="mode-tab" id="tabNup">まとめる</button>
    </div>

    <!-- ── Convert panel ─────────────────────────────────────────── -->
    <div id="convertPanel">
      <div id="dropzone">
        <div class="icon">📂</div>
        <p class="main-text"><strong id="selectLink">ファイルを選択</strong>　またはここにドロップ</p>
        <p class="sub-text" id="dropSubText">SVG・PNG・JPG に対応</p>
      </div>
      <input type="file" id="fileInput" accept=".svg,.png,.jpg,.jpeg,.pdf,image/svg+xml,image/png,image/jpeg,application/pdf" multiple>

      <div id="outputSelector">
        <label class="heading">出力形式</label>
        <div class="radio-group" id="radioGroup"></div>
        <button id="sortBtn">名前順 ↑</button>
      </div>

      <div id="fileList"></div>

      <div class="actions">
        <button id="convertBtn" disabled>変換する</button>
        <button id="clearBtn" disabled>すべて削除</button>
      </div>

      <div id="progress">
        <p class="progress-label" id="progressLabel">変換中...</p>
        <div class="progress-bar-wrap">
          <div class="progress-bar" id="progressBar"></div>
        </div>
      </div>
    </div>

    <!-- ── Organize panel ────────────────────────────────────────── -->
    <div id="organizePanel" style="display:none">
      <div id="orgDropzone">
        <strong id="orgSelectLink">PDFを選択</strong>　またはここにドロップして追加
      </div>
      <input type="file" id="orgFileInput" accept=".pdf,application/pdf" multiple>

      <div id="orgToolbar">
        <button class="org-btn" id="orgRotateLeftBtn" disabled>↺ 左回転</button>
        <button class="org-btn" id="orgRotateRightBtn" disabled>↻ 右回転</button>
        <button class="org-btn danger" id="orgDeleteBtn" disabled>削除</button>
        <button class="org-btn" id="orgDeselectBtn" disabled>選択解除</button>
        <div class="org-sep"></div>
        <span id="orgStatus"></span>
      </div>

      <div id="orgGrid">
        <div class="org-empty">PDFをドロップしてページを追加</div>
      </div>

      <div class="org-export-actions" id="orgExportActions" style="display:none">
        <div class="org-export-item">
          <input type="text" class="org-export-name" id="orgExtractName" placeholder="ファイル名">
          <button class="org-btn" id="orgExtractBtn" disabled>選択を抽出</button>
        </div>
        <div class="org-export-item">
          <input type="text" class="org-export-name" id="orgSaveName" placeholder="ファイル名">
          <button class="org-btn primary" id="orgSaveBtn" disabled>保存</button>
        </div>
      </div>

      <div class="org-progress" id="orgProgress" style="display:none">
        <p class="progress-label" id="orgProgressLabel">処理中...</p>
        <div class="progress-bar-wrap">
          <div class="progress-bar" id="orgProgressBar"></div>
        </div>
      </div>
    </div>

    <!-- ── Compress panel ────────────────────────────────────────── -->
    <div id="compressPanel" style="display:none">
      <div id="cmpDropzone">
        <div class="icon">🗜️</div>
        <p class="main-text"><strong id="cmpSelectLink">ファイルを選択</strong>　またはここにドロップ</p>
        <p class="sub-text">PNG・JPG に対応</p>
      </div>
      <input type="file" id="cmpFileInput" accept=".png,.jpg,.jpeg,image/png,image/jpeg" multiple>

      <div id="cmpOptions" style="display:none">
        <div class="cmp-options-row">
          <label class="heading">出力形式</label>
          <div class="radio-group" id="cmpFormatGroup">
            <label class="selected" data-fmt="jpg">

  <div id="toast"></div>
  <div id="build-time">built 2026-07-24 JST</div>

  <script>
    const { jsPDF } = window.jspdf;

    pdfjsLib.GlobalWorkerOptions.workerSrc =
      'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

    // ─── Shared utilities ─────────────────────────────────────────

    const toast = document.getElementById('toast');

    function showToast(msg) {
      toast.textContent = msg;
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 2500);
    }

    function formatSize(bytes) {
      if (bytes < 1024) return bytes + ' B';
      if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
      return (bytes / 1024 / 1024).toFixed(1) + ' MB';
    }

    function escHtml(str) {
      return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    function downloadBlob(blob, filename) {
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url; a.download = filename; a.click();
      setTimeout(() => URL.revokeObjectURL(url), 1000);
    }

    function dateSuffix() {
      return new Date().toISOString().slice(0, 10);
    }

    // ─── Mode switching ───────────────────────────────────────────

    const tabConvert    = document.getElementById('tabConvert');
    const tabOrganize   = document.getElementById('tabOrganize');
    const tabCompress   = document.getElementById('tabCompress');
    const tabNup        = document.getElementById('tabNup');
    const convertPanel  = document.getElementById('convertPanel');
    const organizePanel = document.getElementById('organizePanel');
    const compressPanel = document.getElementById('compressPanel');
    const nupPanel      = document.getElementById('nupPanel');
    const subtitle      = document.getElementById('subtitle');

    function switchTab(activeTab, activePanel, subtitleText) {
      [tabConvert, tabOrganize, tabCompress, tabNup].forEach(t => t.classList.remove('active'));
      [convertPanel, organizePanel, compressPanel, nupPanel].forEach(p => { p.style.display = 'none'; });
      activeTab.classList.add('active');
      activePanel.style.display = '';
      subtitle.textContent = subtitleText;
    }

    tabConvert.addEventListener('click', () =>
      switchTab(tabConvert, convertPanel, 'SVG・PNG・JPG・PDFをドラッグして変換'));
    tabOrganize.addEventListener('click', () =>
      switchTab(tabOrganize, organizePanel, 'PDFのページを結合・分割・回転・並び替えできます'));
    tabCompress.addEventListener('click', () =>
      switchTab(tabCompress, compressPanel, 'PNG・JPGをドラッグして圧縮'));
    tabNup.addEventListener('click', () =>
      switchTab(tabNup, nupPanel, '4ページを1枚にまとめてPDF出力できます'));

    // ═══════════════════════════════════════════════════════════════
    // CONVERT MODE
    // ═══════════════════════════════════════════════════════════════

    const OUTPUT_MAP = {
      svg: ['PNG', 'PDF', 'PDF-V'],
      png: ['JPG', 'PDF'],
      jpg: ['PNG', 'PDF'],
      pdf: ['PNG', 'JPG'],
    };

    const FMT_LABEL = {
      'PDF':   'PDF (ラスタ)',
      'PDF-V': 'PDF (ベクタ)',
    };

    const TYPE_ACCEPT = {
      svg: '.svg,image/svg+xml',
      png: '.png,image/png',
      jpg: '.jpg,.jpeg,image/jpeg',
      pdf: '.pdf,application/pdf',
    };

    const TYPE_LABEL = { svg: 'SVG', png: 'PNG', jpg: 'JPG', pdf: 'PDF' };

    let files = [];
    let lockedType = null;
    let selectedOutput = null;
    let idCounter = 0;
    let dragSrcId = null;
    let sortAsc = true;

    const dropzone      = document.getElementById('dropzone');
    const fileInput     = document.getElementById('fileInput');
    const outputSelector= document.getElementById('outputSelector');
    const radioGroup    = document.getElementById('radioGroup');
    const sortBtn       = document.getElementById('sortBtn');
    const fileList      = document.getElementById('fileList');
    const convertBtn    = document.getElementById('convertBtn');
    const clearBtn      = document.getElementById('clearBtn');
    const progress      = document.getElementById('progress');
    const progressBar   = document.getElementById('progressBar');
    const progressLabel = document.getElementById('progressLabel');
    const dropSubText   = document.getElementById('dropSubText');
    const selectLink    = document.getElementById('selectLink');

    sortBtn.addEventListener('click', () => {
      files.sort((a, b) => {
        const cmp = a.name.localeCompare(b.name, 'ja', { sensitivity: 'base', numeric: true });
        return sortAsc ? cmp : -cmp;
      });
      sortAsc = !sortAsc;
      sortBtn.textContent = `名前順 ${sortAsc ? '↑' : '↓'}`;
      render();
    });

    function getFileType(file) {
      const ext = file.name.split('.').pop().toLowerCase();
      const mime = file.type;
      if (ext === 'svg' || mime === 'image/svg+xml') return 'svg';
      if (ext === 'png' || mime === 'image/png') return 'png';
      if (ext === 'jpg' || ext === 'jpeg' || mime === 'image/jpeg') return 'jpg';
      if (ext === 'pdf' || mime === 'application/pdf') return 'pdf';
      return null;
    }

    async function readFileData(file, type) {
      if (type === 'svg') {
        const content = await file.text();
        const blob = new Blob([content], { type: 'image/svg+xml' });
        return { content, blobUrl: URL.createObjectURL(blob) };
      }
      const dataUrl = await new Promise(resolve => {
        const r = new FileReader();
        r.onload = e => resolve(e.target.result);
        r.readAsDataURL(file);
      });
      return { dataUrl, blobUrl: dataUrl };
    }

    async function readPdfPages(file) {
      const arrayBuffer = await file.arrayBuffer();
      const pdfDoc = await pdfjsLib.getDocument({ data: arrayBuffer.slice(0) }).promise;
      const items = [];

      for (let pageNum = 1; pageNum <= pdfDoc.numPages; pageNum++) {
        const page = await pdfDoc.getPage(pageNum);
        const vp = page.getViewport({ scale: 1 });
        const thumbScale = 120 / Math.max(vp.width, vp.height);
        const thumbVp = page.getViewport({ scale: thumbScale });
        const thumbCanvas = document.createElement('canvas');
        thumbCanvas.width  = Math.round(thumbVp.width);
        thumbCanvas.height = Math.round(thumbVp.height);
        await page.render({ canvasContext: thumbCanvas.getContext('2d'), viewport: thumbVp }).promise;
        const thumbUrl = thumbCanvas.toDataURL('image/jpeg', 0.8);
        thumbCanvas.width = 0; thumbCanvas.height = 0;

        items.push({
          id: idCounter++,
          name: `${file.name}  P.${pageNum}`,
          size: Math.round(file.size / pdfDoc.numPages),
          type: 'pdf',
          arrayBuffer,
          pageNum,
          blobUrl: thumbUrl,
        });
      }
      return items;
    }

    async function addFiles(rawFiles) {
      let skipped = 0;

      for (const f of rawFiles) {
        const t = getFileType(f);
        if (!t) { skipped++; continue; }
        if (lockedType && t !== lockedType) { skipped++; continue; }
        if (!lockedType) {
          lockedType = t;
          selectedOutput = OUTPUT_MAP[t][0];
          updateFileInput();
        }

        if (t === 'pdf') {
          progressLabel.textContent = `${f.name} を読み込み中...`;
          progress.style.display = 'block';
          const pages = await readPdfPages(f);
          files.push(...pages);
          progress.style.display = 'none';
        } else {
          const data = await readFileData(f, t);
          files.push({ id: idCounter++, name: f.name, size: f.size, type: t, ...data });
        }
      }

      if (skipped > 0) {
        showToast(`${skipped}件のファイルをスキップしました（${TYPE_LABEL[lockedType] || '対応外'}以外は混在不可）`);
      }

      render();
    }

    function updateFileInput() {
      fileInput.accept = lockedType ? TYPE_ACCEPT[lockedType] : '.svg,.png,.jpg,.jpeg,image/svg+xml,image/png,image/jpeg';
    }

    function renderOutputSelector() {
      if (!lockedType) {
        outputSelector.style.display = 'none';
        sortBtn.style.display = 'none';
        return;
      }
      outputSelector.style.display = 'flex';
      sortBtn.style.display = '';
      radioGroup.innerHTML = '';
      OUTPUT_MAP[lockedType].forEach(fmt => {
        const lbl = document.createElement('label');
        lbl.className = 'radio-group-label' + (fmt === selectedOutput ? ' selected' : '');
        lbl.dataset.fmt = fmt;
        const displayName = FMT_LABEL[fmt] || fmt;
        lbl.innerHTML = `<input type="radio" name="output" value="${fmt}"${fmt === selectedOutput ? ' checked' : ''}><span>${displayName}</span>`;
        lbl.addEventListener('click', () => {
          selectedOutput = fmt;
          document.querySelectorAll('.radio-group label').forEach(el => el.classList.remove('selected'));
          lbl.classList.add('selected');
        });
        radioGroup.appendChild(lbl);
      });
    }

    function render() {
      const hasFiles = files.length > 0;

      if (lockedType) {
        dropzone.classList.add('locked');
        dropSubText.textContent = `${TYPE_LABEL[lockedType]}ファイルのみ追加できます`;
      } else {
        dropzone.classList.remove('locked');
        dropSubText.textContent = 'SVG・PNG・JPG に対応';
      }

      renderOutputSelector();

      fileList.innerHTML = '';
      files.forEach((file, index) => {
        const item = document.createElement('div');
        item.className = 'file-item';
        item.dataset.id = file.id;
        item.innerHTML = `
          <span class="drag-handle" title="ドラッグして並び替え">
            <svg width="12" height="18" viewBox="0 0 12 18" fill="currentColor">
              <circle cx="3" cy="3" r="1.5"/><circle cx="9" cy="3" r="1.5"/>
              <circle cx="3" cy="9" r="1.5"/><circle cx="9" cy="9" r="1.5"/>
              <circle cx="3" cy="15" r="1.5"/><circle cx="9" cy="15" r="1.5"/>
            </svg>
          </span>
          <div class="file-thumb"><img src="${file.blobUrl}" alt=""></div>
          <div class="file-info">
            <div class="file-name">${escHtml(file.name)}</div>
            <div class="file-size">${formatSize(file.size)}</div>
          </div>
          <span class="type-badge ${file.type}">${file.type.toUpperCase()}</span>
          <span class="page-num">#${index + 1}</span>
          <button class="remove-btn" title="削除">×</button>
        `;
        item.querySelector('.remove-btn').addEventListener('click', () => {
          if (file.type === 'svg') URL.revokeObjectURL(file.blobUrl);
          files = files.filter(f => f.id !== file.id);
          if (files.length === 0) { lockedType = null; selectedOutput = null; updateFileInput(); }
          render();
        });
        setupDrag(item);
        fileList.appendChild(item);
      });

      convertBtn.disabled = !hasFiles;
      clearBtn.disabled   = !hasFiles;
    }

    function setupDrag(item) {
      const handle = item.querySelector('.drag-handle');
      handle.addEventListener('pointerdown', () => { item.draggable = true; });
      document.addEventListener('pointerup', () => { item.draggable = false; }, { passive: true });

      item.addEventListener('dragstart', e => {
        if (!item.draggable) { e.preventDefault(); return; }
        dragSrcId = parseInt(item.dataset.id);
        item.classList.add('dragging');
        e.dataTransfer.effectAllowed = 'move';
      });
      item.addEventListener('dragend', () => {
        item.draggable = false; item.classList.remove('dragging'); dragSrcId = null;
      });
      item.addEventListener('dragover', e => {
        if (dragSrcId === null) return;
        e.preventDefault(); e.dataTransfer.dropEffect = 'move';
        document.querySelectorAll('.file-item').forEach(el => el.classList.remove('drag-over'));
        item.classList.add('drag-over');
      });
      item.addEventListener('dragleave', () => item.classList.remove('drag-over'));
      item.addEventListener('drop', e => {
        e.preventDefault(); item.classList.remove('drag-over');
        const targetId = parseInt(item.dataset.id);
        if (dragSrcId === null || dragSrcId === targetId) return;
        const si = files.findIndex(f => f.id === dragSrcId);
        const ti = files.findIndex(f => f.id === targetId);
        const [moved] = files.splice(si, 1);
        files.splice(ti, 0, moved);
        render();
      });
    }

    dropzone.addEventListener('dragover', e => {
      e.preventDefault();
      if (dragSrcId !== null) return;
      dropzone.classList.add('hover');
    });
    dropzone.addEventListener('dragleave', () => dropzone.classList.remove('hover'));
    dropzone.addEventListener('drop', async e => {
      e.preventDefault(); dropzone.classList.remove('hover');
      await addFiles([...e.dataTransfer.files]);
    });
    dropzone.addEventListener('click', e => {
      if (e.target !== selectLink && !selectLink.contains(e.target)) fileInput.click();
    });
    selectLink.addEventListener('click', e => { e.stopPropagation(); fileInput.click(); });
    fileInput.addEventListener('change', async () => {
      await addFiles([...fileInput.files]); fileInput.value = '';
    });

    clearBtn.addEventListener('click', () => {
      files.forEach(f => { if (f.type === 'svg') URL.revokeObjectURL(f.blobUrl); });
      files = []; lockedType = null; selectedOutput = null;
      updateFileInput(); render();
    });

    // ─── Conversion helpers ───────────────────────────────────────

    function parseSvgDimensions(svgContent) {
      const doc = new DOMParser().parseFromString(svgContent, 'image/svg+xml');
      const svg = doc.querySelector('svg');
      if (!svg) return { widthPt: 595.28, heightPt: 841.89, widthPx: 794, heightPx: 1123 };

      const vb = (svg.getAttribute('viewBox') || '').trim().split(/[\s,]+/);
      let vbW = parseFloat(vb[2]) || 0;
      let vbH = parseFloat(vb[3]) || 0;

      function attrToPt(attr) {
        if (!attr || attr.includes('%')) return null;
        const n = parseFloat(attr);
        if (!n || n <= 0) return null;
        if (/mm/.test(attr)) return n * 72 / 25.4;
        if (/cm/.test(attr)) return n * 72 / 2.54;
        if (/in/.test(attr)) return n * 72;
        if (/pt/.test(attr)) return n;
        if (/pc/.test(attr)) return n * 12;
        return n * 0.75;
      }

      let widthPt  = attrToPt(svg.getAttribute('width'));
      let heightPt = attrToPt(svg.getAttribute('height'));

      if (!widthPt || !heightPt) {
        const { w, h } = inferPageSize(vbW || 794, vbH || 1123);
        widthPt = w; heightPt = h;
      }

      const widthPx  = vbW  || widthPt  / 0.75;
      const heightPx = vbH  || heightPt / 0.75;
      return { widthPt, heightPt, widthPx, heightPx };
    }

    function inferPageSize(vbW, vbH) {
      const portrait = vbH >= vbW;
      const r = portrait ? vbW / vbH : vbH / vbW;
      const SIZES = [
        [595.28, 841.89], [841.89, 1190.55],
        [612, 792], [792, 1224], [612, 1008],
        [499.43, 708.66], [708.66, 1000.63],
      ];
      let best = null, bestDiff = 0.025;
      for (const [w, h] of SIZES) {
        const diff = Math.abs(r - w / h);
        if (diff < bestDiff) { bestDiff = diff; best = [w, h]; }
      }
      if (!best) best = [595.28, 841.89];
      return portrait ? { w: best[0], h: best[1] } : { w: best[1], h: best[0] };
    }

    async function svgToCanvas(svgContent, widthPx, heightPx, scale = 3) {
      const svgDoc = new DOMParser().parseFromString(svgContent, 'image/svg+xml');
      const svgEl2 = svgDoc.querySelector('svg');
      svgEl2.setAttribute('width',  widthPx);
      svgEl2.setAttribute('height', heightPx);
      const fixedSvg = new XMLSerializer().serializeToString(svgDoc);

      const MAX_PX = 6000;
      const s = Math.min(scale, MAX_PX / Math.max(widthPx, heightPx));
      const canvas = document.createElement('canvas');
      canvas.width  = Math.round(widthPx  * s);
      canvas.height = Math.round(heightPx * s);
      const ctx = canvas.getContext('2d');
      ctx.scale(s, s);
      const blob = new Blob([fixedSvg], { type: 'image/svg+xml;charset=utf-8' });
      const url = URL.createObjectURL(blob);
      await new Promise((resolve, reject) => {
        const img = new Image();
        img.onload = () => { ctx.drawImage(img, 0, 0, widthPx, heightPx); resolve(); };
        img.onerror = reject;
        img.src = url;
      });
      URL.revokeObjectURL(url);
      return canvas;
    }

    async function pdfPageToCanvas(file, outputMime) {
      const pdfDoc = await pdfjsLib.getDocument({ data: file.arrayBuffer.slice(0) }).promise;
      const page = await pdfDoc.getPage(file.pageNum);
      const vp = page.getViewport({ scale: 1 });
      const canvas = document.createElement('canvas');
      canvas.width  = Math.round(vp.width);
      canvas.height = Math.round(vp.height);
      const ctx = canvas.getContext('2d');
      if (outputMime === 'image/jpeg') {
        ctx.fillStyle = '#ffffff';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
      }
      await page.render({ canvasContext: ctx, viewport: vp }).promise;
      return canvas;
    }

    async function imageUrlToCanvas(src, outputMime) {
      const img = new Image();
      await new Promise((resolve, reject) => {
        img.onload = resolve; img.onerror = reject;
        img.crossOrigin = 'anonymous';
        img.src = src;
      });
      const canvas = document.createElement('canvas');
      canvas.width = img.naturalWidth; canvas.height = img.naturalHeight;
      const ctx = canvas.getContext('2d');
      if (outputMime === 'image/jpeg') {
        ctx.fillStyle = '#ffffff'; ctx.fillRect(0, 0, canvas.width, canvas.height);
      }
      ctx.drawImage(img, 0, 0);
      return canvas;
    }

    async function canvasToBlob(canvas, mime, quality = 0.92) {
      return new Promise(resolve => canvas.toBlob(resolve, mime, quality));
    }

    // ─── Main convert export ──────────────────────────────────────

    convertBtn.addEventListener('click', async () => {
      if (!files.length || !selectedOutput) return;
      convertBtn.disabled = true; clearBtn.disabled = true;
      progress.style.display = 'block'; progressBar.style.width = '0%';

      try {
        const out = selectedOutput;
        const inp = lockedType;

        if (out === 'PDF' || out === 'PDF-V') {
          const wantVector = out === 'PDF-V';
          try {
            await convertToPdf(inp, wantVector);
          } catch (vecErr) {
            if (wantVector) {
              showToast('ベクタ変換に失敗しました。ラスタに切り替えて再試行します…');
              progressBar.style.width = '0%';
              await convertToPdf(inp, false);
            } else { throw vecErr; }
          }
        } else {
          await convertToImages(inp, out.toLowerCase());
        }

        progressBar.style.width = '100%';
        progressLabel.textContent = '完了！';
        showToast('変換完了しました');

        setTimeout(() => {
          progress.style.display = 'none'; progressBar.style.width = '0%';
          convertBtn.disabled = false; clearBtn.disabled = false;
        }, 1500);

      } catch (err) {
        progressLabel.textContent = 'エラー: ' + err.message;
        console.error(err);
        convertBtn.disabled = false; clearBtn.disabled = false;
      }
    });

    async function convertToPdf(inputType, useVector = false) {
      const A4_W = 595.28, A4_H = 841.89;
      let pdf = null;

      for (let i = 0; i < files.length; i++) {
        const file = files[i];
        progressLabel.textContent = `PDF変換中... ${i + 1} / ${files.length}`;
        progressBar.style.width = `${(i / files.length) * 100}%`;

        if (inputType === 'svg') {
          const { widthPt, heightPt, widthPx, heightPx } = parseSvgDimensions(file.content);
          if (i === 0) {
            pdf = new jsPDF({ orientation: widthPt > heightPt ? 'l' : 'p', unit: 'pt', format: [widthPt, heightPt] });
          } else {
            pdf.addPage([widthPt, heightPt], widthPt > heightPt ? 'l' : 'p');
          }

          if (useVector) {
            const svgDoc = new DOMParser().parseFromString(file.content, 'image/svg+xml');
            const svgEl = svgDoc.querySelector('svg');
            svgEl.setAttribute('width',  widthPt + 'pt');
            svgEl.setAttribute('height', heightPt + 'pt');
            svgEl.style.cssText = 'position:absolute;left:-99999px;top:0;';
            document.body.appendChild(svgEl);
            try {
              await svg2pdf.svg2pdf(svgEl, pdf, { x: 0, y: 0, width: widthPt, height: heightPt });
            } finally {
              document.body.removeChild(svgEl);
            }
          } else {
            const canvas = await svgToCanvas(file.content, widthPx, heightPx);
            const ctx2 = canvas.getContext('2d');
            ctx2.globalCompositeOperation = 'destination-over';
            ctx2.fillStyle = '#ffffff';
            ctx2.fillRect(0, 0, canvas.width, canvas.height);
            const dataUrl = canvas.toDataURL('image/jpeg', 0.92);
            canvas.width = 0; canvas.height = 0;
            pdf.addImage(dataUrl, 'JPEG', 0, 0, widthPt, heightPt);
          }

        } else {
          const img = new Image();
          await new Promise((resolve, reject) => {
            img.onload = resolve; img.onerror = reject; img.src = file.blobUrl;
          });
          const ratio = Math.min(A4_W / img.naturalWidth, A4_H / img.naturalHeight);
          const w = img.naturalWidth * ratio, h = img.naturalHeight * ratio;
          const x = (A4_W - w) / 2, y = (A4_H - h) / 2;
          const fmt = inputType === 'png' ? 'PNG' : 'JPEG';
          if (i === 0) { pdf = new jsPDF({ unit: 'pt', format: 'a4' }); }
          else { pdf.addPage('a4'); }
          pdf.addImage(file.blobUrl, fmt, x, y, w, h);
        }
      }
      const base = files[0].name.replace(/\.[^.]+$/, '');
      pdf.save(files.length === 1 ? `${base}.pdf` : `${base}_combined.pdf`);
    }

    async function convertToImages(inputType, outputExt) {
      const mime = outputExt === 'jpg' ? 'image/jpeg' : 'image/png';
      const results = [];

      for (let i = 0; i < files.length; i++) {
        const file = files[i];
        progressLabel.textContent = `画像変換中... ${i + 1} / ${files.length}`;
        progressBar.style.width = `${(i / files.length) * 100}%`;

        let canvas;
        if (inputType === 'svg') {
          const { widthPx, heightPx } = parseSvgDimensions(file.content);
          canvas = await svgToCanvas(file.content, widthPx, heightPx);
        } else if (inputType === 'pdf') {
          canvas = await pdfPageToCanvas(file, mime);
        } else {
          canvas = await imageUrlToCanvas(file.blobUrl, mime);
        }

        const blob = await canvasToBlob(canvas, mime);
        const baseName = file.name.replace(/\.[^.]+$/, '');
        results.push({ name: `${baseName}.${outputExt}`, blob });
      }

      if (results.length === 1) {
        downloadBlob(results[0].blob, results[0].name);
      } else {
        progressLabel.textContent = 'ZIPを作成中...';
        const zip = new JSZip();
        results.forEach(r => zip.file(r.name, r.blob));
        const zipBlob = await zip.generateAsync({ type: 'blob' });
        const zipBase = files[0].name.replace(/\.[^.]+$/, '');
        downloadBlob(zipBlob, `${zipBase}_etc.zip`);
      }
    }

    render();

    // ═══════════════════════════════════════════════════════════════
    // ORGANIZE MODE
    // ═══════════════════════════════════════════════════════════════

    let orgPages   = [];          // { id, srcBytes, srcPageIdx, thumbUrl, rotation, label }
    let orgSelected = new Set();  // Set<id>
    let orgDragSrcId = null;
    let orgIdCounter = 0;

    const orgDropzone      = document.getElementById('orgDropzone');
    const orgFileInput     = document.getElementById('orgFileInput');
    const orgSelectLink    = document.getElementById('orgSelectLink');
    const orgGrid          = document.getElementById('orgGrid');
    const orgRotateLeftBtn = document.getElementById('orgRotateLeftBtn');
    const orgRotateRightBtn= document.getElementById('orgRotateRightBtn');
    const orgDeleteBtn     = document.getElementById('orgDeleteBtn');
    const orgDeselectBtn   = document.getElementById('orgDeselectBtn');
    const orgExtractBtn    = document.getElementById('orgExtractBtn');
    const orgExtractName   = document.getElementById('orgExtractName');
    const orgSaveBtn       = document.getElementById('orgSaveBtn');
    const orgSaveName      = document.getElementById('orgSaveName');
    const orgExportActions = document.getElementById('orgExportActions');
    const orgStatus        = document.getElementById('orgStatus');
    const orgProgress      = document.getElementById('orgProgress');
    const orgProgressBar   = document.getElementById('orgProgressBar');
    const orgProgressLabel = document.getElementById('orgProgressLabel');

    // ── Load PDF pages ────────────────────────────────────────────

    async function orgLoadPdf(file, onPageDone) {
      const arrayBuffer = await file.arrayBuffer();
      const srcBytes = new Uint8Array(arrayBuffer);
      const pdfDoc = await pdfjsLib.getDocument({ data: arrayBuffer.slice(0) }).promise;

      for (let i = 0; i < pdfDoc.numPages; i++) {
        const page = await pdfDoc.getPage(i + 1);
        const vp = page.getViewport({ scale: 1 });
        const thumbScale = 160 / Math.max(vp.width, vp.height);
        const thumbVp = page.getViewport({ scale: thumbScale });
        const thumbCanvas = document.createElement('canvas');
        thumbCanvas.width  = Math.round(thumbVp.width);
        thumbCanvas.height = Math.round(thumbVp.height);
        await page.render({ canvasContext: thumbCanvas.getContext('2d'), viewport: thumbVp }).promise;
        const thumbUrl = thumbCanvas.toDataURL('image/jpeg', 0.85);
        thumbCanvas.width = 0; thumbCanvas.height = 0;

        orgPages.push({
          id: orgIdCounter++,
          srcBytes,
          srcPageIdx: i,
          thumbUrl,
          rotation: 0,
          fileName: file.name.replace(/\.[^.]+$/, ''),
          label: `${file.name}  P.${i + 1}`,
        });
        if (onPageDone) onPageDone(i + 1, pdfDoc.numPages);
      }
    }

    // ── Render grid ───────────────────────────────────────────────

    function orgRender() {
      orgGrid.innerHTML = '';

      if (orgPages.length === 0) {
        const empty = document.createElement('div');
        empty.className = 'org-empty';
        empty.textContent = 'PDFをドロップしてページを追加';
        orgGrid.appendChild(empty);
        orgSaveBtn.disabled = true;
        orgExportActions.style.display = 'none';
        orgUpdateToolbar();
        return;
      }

      orgPages.forEach((page, index) => {
        const card = document.createElement('div');
        card.className = 'org-card' + (orgSelected.has(page.id) ? ' selected' : '');
        card.dataset.id = page.id;

        const thumbWrap = document.createElement('div');
        thumbWrap.className = 'org-thumb';
        const img = document.createElement('img');
        img.src = page.thumbUrl;
        img.alt = '';
        // 90°/270° は縮小して見切れを防ぐ
        const rot = page.rotation;
        img.style.transform = rot
          ? `rotate(${rot}deg) scale(${rot === 90 || rot === 270 ? 0.72 : 1})`
          : '';
        thumbWrap.appendChild(img);

        const pageNum = document.createElement('div');
        pageNum.className = 'org-page-num';
        pageNum.textContent = `P.${index + 1}`;

        card.appendChild(thumbWrap);
        card.appendChild(pageNum);

        card.addEventListener('click', e => {
          if (e.shiftKey && orgSelected.size > 0) {
            // 範囲選択
            const arr = [...orgSelected];
            const lastIdx = orgPages.findIndex(p => p.id === arr[arr.length - 1]);
            const [from, to] = [Math.min(lastIdx, index), Math.max(lastIdx, index)];
            for (let j = from; j <= to; j++) orgSelected.add(orgPages[j].id);
          } else if (e.metaKey || e.ctrlKey) {
            if (orgSelected.has(page.id)) orgSelected.delete(page.id);
            else orgSelected.add(page.id);
          } else {
            orgSelected.clear();
            orgSelected.add(page.id);
          }
          orgRender();
        });

        orgSetupCardDrag(card);
        orgGrid.appendChild(card);
      });

      orgSaveBtn.disabled = false;
      orgExportActions.style.display = '';
      orgUpdateToolbar();
    }

    function orgUpdateToolbar() {
      const hasSel = orgSelected.size > 0;
      orgRotateLeftBtn.disabled  = !hasSel;
      orgRotateRightBtn.disabled = !hasSel;
      orgDeleteBtn.disabled      = !hasSel;
      orgDeselectBtn.disabled    = !hasSel;
      orgExtractBtn.disabled     = !hasSel;

      if (orgPages.length === 0) {
        orgStatus.textContent = '';
      } else if (orgSelected.size === 0) {
        orgStatus.textContent = `${orgPages.length} ページ`;
      } else {
        orgStatus.textContent = `${orgPages.length} ページ中 ${orgSelected.size} 件選択`;
      }

      // プレースホルダーをデフォルト名に同期
      const saveBase = orgPages[0]?.fileName || 'document';
      orgSaveName.placeholder = `${saveBase}_organized`;
      const selFirst = orgPages.find(p => orgSelected.has(p.id));
      const extractBase = selFirst?.fileName || orgPages[0]?.fileName || 'document';
      orgExtractName.placeholder = `${extractBase}_extracted`;
    }

    // ── Drag-to-reorder (cards) ───────────────────────────────────

    function orgSetupCardDrag(card) {
      card.draggable = true;

      card.addEventListener('dragstart', e => {
        orgDragSrcId = parseInt(card.dataset.id);
        card.classList.add('dragging');
        e.dataTransfer.effectAllowed = 'move';
      });
      card.addEventListener('dragend', () => {
        card.classList.remove('dragging'); orgDragSrcId = null;
      });
      card.addEventListener('dragover', e => {
        if (orgDragSrcId === null) return;
        e.preventDefault(); e.dataTransfer.dropEffect = 'move';
        document.querySelectorAll('.org-card').forEach(el => el.classList.remove('drag-over'));
        card.classList.add('drag-over');
      });
      card.addEventListener('dragleave', () => card.classList.remove('drag-over'));
      card.addEventListener('drop', e => {
        e.preventDefault(); card.classList.remove('drag-over');
        const targetId = parseInt(card.dataset.id);
        if (orgDragSrcId === null || orgDragSrcId === targetId) return;
        const si = orgPages.findIndex(p => p.id === orgDragSrcId);
        const ti = orgPages.findIndex(p => p.id === targetId);
        const [moved] = orgPages.splice(si, 1);
        orgPages.splice(ti, 0, moved);
        orgRender();
      });
    }

    // ── Toolbar actions ───────────────────────────────────────────

    orgRotateLeftBtn.addEventListener('click', () => {
      orgPages.forEach(p => {
        if (orgSelected.has(p.id)) p.rotation = (p.rotation - 90 + 360) % 360;
      });
      orgRender();
    });

    orgRotateRightBtn.addEventListener('click', () => {
      orgPages.forEach(p => {
        if (orgSelected.has(p.id)) p.rotation = (p.rotation + 90) % 360;
      });
      orgRender();
    });

    orgDeleteBtn.addEventListener('click', () => {
      orgPages = orgPages.filter(p => !orgSelected.has(p.id));
      orgSelected.clear();
      orgRender();
    });

    orgDeselectBtn.addEventListener('click', () => {
      orgSelected.clear();
      orgRender();
    });

    orgExtractBtn.addEventListener('click', async () => {
      const pagesToExport = orgPages.filter(p => orgSelected.has(p.id));
      const extractBase = pagesToExport[0]?.fileName || orgPages[0]?.fileName || 'document';
      const customName = orgExtractName.value.trim();
      await orgRunExport(pagesToExport, (customName || `${extractBase}_extracted`) + '.pdf');
    });

    orgSaveBtn.addEventListener('click', async () => {
      const saveBase = orgPages[0]?.fileName || 'document';
      const customName = orgSaveName.value.trim();
      await orgRunExport(orgPages, (customName || `${saveBase}_organized`) + '.pdf');
    });

    async function orgRunExport(pages, filename) {
      orgProgress.style.display = 'block';
      orgProgressBar.style.width = '0%';
      orgSaveBtn.disabled = true;
      orgExtractBtn.disabled = true;

      try {
        const blob = await orgExportPdf(pages);
        downloadBlob(blob, filename);
        showToast('保存しました');
      } catch (err) {
        orgProgressLabel.textContent = 'エラー: ' + err.message;
        console.error(err);
      } finally {
        setTimeout(() => { orgProgress.style.display = 'none'; }, 1200);
        orgSaveBtn.disabled = orgPages.length === 0;
        orgUpdateToolbar();
      }
    }

    async function orgExportPdf(pages) {
      const { PDFDocument, degrees } = PDFLib;
      const outDoc = await PDFDocument.create();
      const loadedDocs = new Map(); // srcBytes (Uint8Array reference) → PDFDocument

      for (let i = 0; i < pages.length; i++) {
        const page = pages[i];
        orgProgressLabel.textContent = `処理中... ${i + 1} / ${pages.length}`;
        orgProgressBar.style.width = `${(i / pages.length) * 100}%`;

        let srcDoc = loadedDocs.get(page.srcBytes);
        if (!srcDoc) {
          srcDoc = await PDFDocument.load(page.srcBytes);
          loadedDocs.set(page.srcBytes, srcDoc);
        }

        const [copied] = await outDoc.copyPages(srcDoc, [page.srcPageIdx]);
        if (page.rotation !== 0) {
          copied.setRotation(degrees(copied.getRotation().angle + page.rotation));
        }
        outDoc.addPage(copied);

        await new Promise(r => setTimeout(r, 0)); // ブラウザに制御を返す
      }

      orgProgressLabel.textContent = 'PDFを生成中...';
      orgProgressBar.style.width = '95%';
      const pdfBytes = await outDoc.save();
      return new Blob([pdfBytes], { type: 'application/pdf' });
    }

    // ── Org drop zone ─────────────────────────────────────────────

    orgDropzone.addEventListener('dragover', e => {
      e.preventDefault(); orgDropzone.classList.add('hover');
    });
    orgDropzone.addEventListener('dragleave', () => orgDropzone.classList.remove('hover'));
    orgDropzone.addEventListener('drop', async e => {
      e.preventDefault(); orgDropzone.classList.remove('hover');
      await orgAddFiles([...e.dataTransfer.files]);
    });
    orgDropzone.addEventListener('click', e => {
      if (e.target === orgSelectLink || orgSelectLink.contains(e.target)) return;
      orgFileInput.click();
    });
    orgSelectLink.addEventListener('click', e => { e.stopPropagation(); orgFileInput.click(); });
    orgFileInput.addEventListener('change', async () => {
      await orgAddFiles([...orgFileInput.files]); orgFileInput.value = '';
    });

    async function orgAddFiles(rawFiles) {
      const pdfs = rawFiles.filter(f => {
        const ext = f.name.split('.').pop().toLowerCase();
        return ext === 'pdf' || f.type === 'application/pdf';
      });
      if (!pdfs.length) { showToast('PDFファイルのみ追加できます'); return; }

      orgProgress.style.display = 'block';
      orgProgressLabel.textContent = '読み込み中...';
      orgProgressBar.style.width = '0%';

      for (let fi = 0; fi < pdfs.length; fi++) {
        const f = pdfs[fi];
        orgProgressLabel.textContent = `${f.name} を読み込み中...`;
        await orgLoadPdf(f, (pg, total) => {
          orgProgressLabel.textContent = `${f.name}（${pg} / ${total} ページ）`;
          orgProgressBar.style.width = `${((fi + pg / total) / pdfs.length) * 100}%`;
        });
      }

      orgProgress.style.display = 'none';
      orgRender();
    }

    // ═══════════════════════════════════════════════════════════════
    // COMPRESS MODE
    // ═══════════════════════════════════════════════════════════════

    let cmpFiles = [];
    let cmpIdCounter = 0;
    let cmpFormat = 'jpg';

    const cmpDropzone      = document.getElementById('cmpDropzone');
    const cmpFileInput     = document.getElementById('cmpFileInput');
    const cmpSelectLink    = document.getElementById('cmpSelectLink');
    const cmpOptions       = document.getElementById('cmpOptions');
    const cmpQuality       = document.getElementById('cmpQuality');
    const cmpQualityVal    = document.getElementById('cmpQualityVal');
    const cmpFileList      = document.getElementById('cmpFileList');
    const cmpBtn           = document.getElementById('cmpBtn');
    const cmpClearBtn      = document.getElementById('cmpClearBtn');
    const cmpProgress      = document.getElementById('cmpProgress');
    const cmpProgressBar   = document.getElementById('cmpProgressBar');
    const cmpProgressLabel = document.getElementById('cmpProgressLabel');

    cmpQuality.addEventListener('input', () => {
      cmpQualityVal.textContent = cmpQuality.value + '%';
      cmpFiles.forEach(f => { delete f.compressedSize; });
      cmpRender();
    });

    document.querySelectorAll('#cmpFormatGroup label').forEach(lbl => {
      lbl.addEventListener('click', () => {
        cmpFormat = lbl.dataset.fmt;
        document.querySelectorAll('#cmpFormatGroup label').forEach(el => el.classList.remove('selected'));
        lbl.classList.add('selected');
        cmpFiles.forEach(f => { delete f.compressedSize; });
        cmpRender();
      });
    });

    async function cmpAddFiles(rawFiles) {
      let skipped = 0;
      for (const f of rawFiles) {
        const t = getFileType(f);
        if (t !== 'png' && t !== 'jpg') { skipped++; continue; }
        const dataUrl = await new Promise(resolve => {
          const r = new FileReader();
          r.onload = e => resolve(e.target.result);
          r.readAsDataURL(f);
        });
        cmpFiles.push({ id: cmpIdCounter++, name: f.name, size: f.size, type: t, blobUrl: dataUrl });
      }
      if (skipped > 0) showToast(`${skipped}件をスキップ（PNG・JPGのみ対応）`);
      cmpRender();
    }

    function cmpRender() {
      const hasFiles = cmpFiles.length > 0;
      cmpOptions.style.display = hasFiles ? '' : 'none';
      cmpFileList.innerHTML = '';

      cmpFiles.forEach(file => {
        const item = document.createElement('div');
        item.className = 'file-item';

        let sizeHtml;
        if (file.compressedSize !== undefined) {
          const pct = Math.round((1 - file.compressedSize / file.size) * 100);
          const color = pct >= 0 ? '#34c759' : '#ff9500';
          const sign  = pct >= 0 ? '−' : '+';
          sizeHtml = `<div class="file-size">${formatSize(file.size)} → <strong style="color:${color}">${formatSize(file.compressedSize)}</strong> <span style="color:${color}">(${sign}${Math.abs(pct)}%)</span></div>`;
        } else {
          sizeHtml = `<div class="file-size">${formatSize(file.size)}</div>`;
        }

        item.innerHTML = `
          <div class="file-thumb"><img src="${file.blobUrl}" alt=""></div>
          <div class="file-info">
            <div class="file-name">${escHtml(file.name)}</div>
            ${sizeHtml}
          </div>
          <span class="type-badge ${file.type}">${file.type.toUpperCase()}</span>
          <button class="remove-btn" title="削除">×</button>
        `;
        item.querySelector('.remove-btn').addEventListener('click', () => {
          cmpFiles = cmpFiles.filter(f => f.id !== file.id);
          cmpRender();
        });
        cmpFileList.appendChild(item);
      });

      cmpBtn.disabled = !hasFiles;
      cmpClearBtn.disabled = !hasFiles;
    }

    cmpBtn.addEventListener('click', async () => {
      if (!cmpFiles.length) return;
      cmpBtn.disabled = true; cmpClearBtn.disabled = true;
      cmpProgress.style.display = 'block'; cmpProgressBar.style.width = '0%';

      try {
        const mime    = cmpFormat === 'webp' ? 'image/webp' : 'image/jpeg';
        const ext     = cmpFormat === 'webp' ? 'webp' : 'jpg';
        const quality = parseInt(cmpQuality.value) / 100;
        const results = [];

        for (let i = 0; i < cmpFiles.length; i++) {
          const file = cmpFiles[i];
          cmpProgressLabel.textContent = `圧縮中... ${i + 1} / ${cmpFiles.length}`;
          cmpProgressBar.style.width = `${(i / cmpFiles.length) * 100}%`;

          const canvas = await imageUrlToCanvas(file.blobUrl, mime);
          const blob   = await canvasToBlob(canvas, mime, quality);
          canvas.width = 0; canvas.height = 0;

          file.compressedSize = blob.size;
          const baseName = file.name.replace(/\.[^.]+$/, '');
          results.push({ name: `${baseName}.${ext}`, blob });
        }

        cmpProgressBar.style.width = '100%';
        cmpProgressLabel.textContent = '完了！';
        cmpRender();

        if (results.length === 1) {
          downloadBlob(results[0].blob, results[0].name);
        } else {
          cmpProgressLabel.textContent = 'ZIPを作成中...';
          const zip = new JSZip();
          results.forEach(r => zip.file(r.name, r.blob));
          const zipBlob = await zip.generateAsync({ type: 'blob' });
          const cmpZipBase = cmpFiles[0].name.replace(/\.[^.]+$/, '');
          downloadBlob(zipBlob, `${cmpZipBase}_compressed.zip`);
        }

        showToast('圧縮完了しました');
        setTimeout(() => { cmpProgress.style.display = 'none'; cmpProgressBar.style.width = '0%'; }, 1500);

      } catch (err) {
        cmpProgressLabel.textContent = 'エラー: ' + err.message;
        console.error(err);
      } finally {
        cmpBtn.disabled = cmpFiles.length === 0;
        cmpClearBtn.disabled = cmpFiles.length === 0;
      }
    });

    cmpClearBtn.addEventListener('click', () => { cmpFiles = []; cmpRender(); });

    cmpDropzone.addEventListener('dragover', e => { e.preventDefault(); cmpDropzone.classList.add('hover'); });
    cmpDropzone.addEventListener('dragleave', () => cmpDropzone.classList.remove('hover'));
    cmpDropzone.addEventListener('drop', async e => {
      e.preventDefault(); cmpDropzone.classList.remove('hover');
      await cmpAddFiles([...e.dataTransfer.files]);
    });
    cmpDropzone.addEventListener('click', e => {
      if (e.target === cmpSelectLink || cmpSelectLink.contains(e.target)) return;
      cmpFileInput.click();
    });
    cmpSelectLink.addEventListener('click', e => { e.stopPropagation(); cmpFileInput.click(); });
    cmpFileInput.addEventListener('change', async () => {
      await cmpAddFiles([...cmpFileInput.files]); cmpFileInput.value = '';
    });

    // ═══════════════════════════════════════════════════════════════
    // 4IN1 MODE
    // ═══════════════════════════════════════════════════════════════

    const NUP_SIZES = {
      a4:  { w: 595.28, h: 841.89 },
      a4l: { w: 841.89, h: 595.28 },
    };

    let nupPages           = [];
    let nupGroupCustomNames = [];
    let nupIdCounter  = 0;
    let nupOutputSize = 'a4';
    let nupMarginPt   = 6;

    const nupDropzone      = document.getElementById('nupDropzone');
    const nupFileInput     = document.getElementById('nupFileInput');
    const nupSelectLink    = document.getElementById('nupSelectLink');
    const nupOptionsEl     = document.getElementById('nupOptions');
    const nupStatusEl      = document.getElementById('nupStatus');
    const nupPreviewGrid   = document.getElementById('nupPreviewGrid');
    const nupActionsEl     = document.getElementById('nupActions');
    const nupBtn           = document.getElementById('nupBtn');
    const nupClearBtn      = document.getElementById('nupClearBtn');
    const nupProgressEl    = document.getElementById('nupProgress');
    const nupProgressBar   = document.getElementById('nupProgressBar');
    const nupProgressLabel = document.getElementById('nupProgressLabel');
    const nupMarginSlider  = document.getElementById('nupMarginSlider');
    const nupMarginValEl   = document.getElementById('nupMarginVal');

    nupMarginSlider.addEventListener('input', () => {
      nupMarginPt = parseInt(nupMarginSlider.value);
      nupMarginValEl.textContent = nupMarginPt + 'pt';
      nupRenderPreview();
    });

    document.querySelectorAll('#nupSizeGroup label').forEach(lbl => {
      lbl.addEventListener('click', () => {
        nupOutputSize = lbl.dataset.size;
        document.querySelectorAll('#nupSizeGroup label').forEach(el => el.classList.remove('selected'));
        lbl.classList.add('selected');
        nupRenderPreview();
      });
    });

    async function nupLoadPdf(file, onPageDone) {
      const arrayBuffer = await file.arrayBuffer();
      const pdfDoc = await pdfjsLib.getDocument({ data: arrayBuffer.slice(0) }).promise;

      for (let i = 0; i < pdfDoc.numPages; i++) {
        const page = await pdfDoc.getPage(i + 1);
        const vp = page.getViewport({ scale: 1 });
        const thumbScale = 120 / Math.max(vp.width, vp.height);
        const thumbVp = page.getViewport({ scale: thumbScale });
        const thumbCanvas = document.createElement('canvas');
        thumbCanvas.width  = Math.round(thumbVp.width);
        thumbCanvas.height = Math.round(thumbVp.height);
        await page.render({ canvasContext: thumbCanvas.getContext('2d'), viewport: thumbVp }).promise;
        const thumbUrl = thumbCanvas.toDataURL('image/jpeg', 0.82);
        thumbCanvas.width = 0; thumbCanvas.height = 0;

        nupPages.push({ id: nupIdCounter++, arrayBuffer, srcPageIdx: i, thumbUrl,
                        naturalW: vp.width, naturalH: vp.height,
                        fileName: file.name.replace(/\.[^.]+$/, '') });
        if (onPageDone) onPageDone(i + 1, pdfDoc.numPages);
      }
    }

    function nupRenderPreview() {
      nupPreviewGrid.innerHTML = '';
      if (!nupPages.length) return;

      const { w: pageW, h: pageH } = NUP_SIZES[nupOutputSize];
      const numGroups = Math.ceil(nupPages.length / 4);

      for (let gi = 0; gi < numGroups; gi++) {
        const group = nupPages.slice(gi * 4, gi * 4 + 4);
        const card = document.createElement('div');
        card.className = 'nup-output-card';

        const grid = document.createElement('div');
        grid.className = 'nup-2x2-grid';
        grid.style.aspectRatio = `${pageW} / ${pageH}`;

        for (let ci = 0; ci < 4; ci++) {
          const cell = document.createElement('div');
          cell.className = 'nup-cell' + (ci >= group.length ? ' empty' : '');
          if (ci < group.length) {
            const img = document.createElement('img');
            img.src = group[ci].thumbUrl;
            img.alt = '';
            cell.appendChild(img);
          }
          grid.appendChild(cell);
        }

        const lbl = document.createElement('div');
        lbl.className = 'nup-page-label';
        lbl.textContent = `出力 P.${gi + 1}`;

        const defaultName = group[0].fileName + '_4in1';
        const inp = document.createElement('input');
        inp.type = 'text';
        inp.className = 'nup-name-input';
        inp.placeholder = defaultName;
        inp.value = nupGroupCustomNames[gi] || '';
        inp.addEventListener('input', () => { nupGroupCustomNames[gi] = inp.value; });

        card.appendChild(grid);
        card.appendChild(lbl);
        card.appendChild(inp);
        nupPreviewGrid.appendChild(card);
      }

      nupStatusEl.style.display = '';
      nupStatusEl.textContent = `${nupPages.length} ページ → ${numGroups} ページ（4ページ/枚）`;
      nupOptionsEl.style.display = '';
      nupActionsEl.style.display = '';
      nupBtn.disabled = false;
      nupClearBtn.disabled = false;
    }

    async function nupAddFiles(rawFiles) {
      const pdfs = rawFiles.filter(f => {
        const ext = f.name.split('.').pop().toLowerCase();
        return ext === 'pdf' || f.type === 'application/pdf';
      });
      if (!pdfs.length) { showToast('PDFファイルのみ追加できます'); return; }

      nupProgressEl.style.display = 'block';
      nupProgressLabel.textContent = '読み込み中...';
      nupProgressBar.style.width = '0%';

      for (let fi = 0; fi < pdfs.length; fi++) {
        const f = pdfs[fi];
        nupProgressLabel.textContent = `${f.name} を読み込み中...`;
        await nupLoadPdf(f, (pg, total) => {
          nupProgressLabel.textContent = `${f.name}（${pg} / ${total} ページ）`;
          nupProgressBar.style.width = `${((fi + pg / total) / pdfs.length) * 100}%`;
        });
      }

      nupProgressEl.style.display = 'none';
      nupRenderPreview();
    }

    nupDropzone.addEventListener('dragover', e => { e.preventDefault(); nupDropzone.classList.add('hover'); });
    nupDropzone.addEventListener('dragleave', () => nupDropzone.classList.remove('hover'));
    nupDropzone.addEventListener('drop', async e => {
      e.preventDefault(); nupDropzone.classList.remove('hover');
      await nupAddFiles([...e.dataTransfer.files]);
    });
    nupDropzone.addEventListener('click', e => {
      if (e.target === nupSelectLink || nupSelectLink.contains(e.target)) return;
      nupFileInput.click();
    });
    nupSelectLink.addEventListener('click', e => { e.stopPropagation(); nupFileInput.click(); });
    nupFileInput.addEventListener('change', async () => {
      await nupAddFiles([...nupFileInput.files]); nupFileInput.value = '';
    });

    nupClearBtn.addEventListener('click', () => {
      nupPages = [];
      nupGroupCustomNames = [];
      nupPreviewGrid.innerHTML = '';
      nupOptionsEl.style.display = 'none';
      nupStatusEl.style.display = 'none';
      nupActionsEl.style.display = 'none';
      nupBtn.disabled = true;
      nupClearBtn.disabled = true;
    });

    nupBtn.addEventListener('click', async () => {
      if (!nupPages.length) return;
      nupBtn.disabled = true; nupClearBtn.disabled = true;
      nupProgressEl.style.display = 'block'; nupProgressBar.style.width = '0%';

      try {
        const { w: outW, h: outH } = NUP_SIZES[nupOutputSize];
        const m = nupMarginPt;
        const cellW = (outW - m * 3) / 2;
        const cellH = (outH - m * 3) / 2;
        const orient = outW > outH ? 'l' : 'p';
        const numGroups = Math.ceil(nupPages.length / 4);

        // PDF.js ドキュメントを ArrayBuffer 参照でキャッシュ
        const pdfDocCache = new Map();
        async function getSrcDoc(buf) {
          if (!pdfDocCache.has(buf)) {
            pdfDocCache.set(buf, await pdfjsLib.getDocument({ data: buf.slice(0) }).promise);
          }
          return pdfDocCache.get(buf);
        }

        for (let gi = 0; gi < numGroups; gi++) {
          const group = nupPages.slice(gi * 4, gi * 4 + 4);
          const pdf = new jsPDF({ orientation: orient, unit: 'pt', format: [outW, outH] });

          nupProgressLabel.textContent = `生成中... ${gi + 1} / ${numGroups}`;
          nupProgressBar.style.width = `${(gi / numGroups) * 90}%`;

          for (let ci = 0; ci < group.length; ci++) {
            const np = group[ci];
            const col = ci % 2;
            const row = Math.floor(ci / 2);
            const cellX = m + col * (cellW + m);
            const cellY = m + row * (cellH + m);

            const srcDoc  = await getSrcDoc(np.arrayBuffer);
            const srcPage = await srcDoc.getPage(np.srcPageIdx + 1);
            const vp      = srcPage.getViewport({ scale: 1 });

            const scale    = Math.min(cellW / vp.width, cellH / vp.height) * 3;
            const renderVp = srcPage.getViewport({ scale });
            const canvas   = document.createElement('canvas');
            canvas.width   = Math.round(renderVp.width);
            canvas.height  = Math.round(renderVp.height);
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = '#ffffff';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            await srcPage.render({ canvasContext: ctx, viewport: renderVp }).promise;

            // セル内でレターボックスフィット
            const srcAspect  = vp.width / vp.height;
            const cellAspect = cellW / cellH;
            let imgW, imgH, imgX, imgY;
            if (srcAspect >= cellAspect) {
              imgW = cellW; imgH = cellW / srcAspect;
              imgX = cellX; imgY = cellY + (cellH - imgH) / 2;
            } else {
              imgH = cellH; imgW = cellH * srcAspect;
              imgX = cellX + (cellW - imgW) / 2; imgY = cellY;
            }

            const dataUrl = canvas.toDataURL('image/jpeg', 0.95);
            canvas.width = 0; canvas.height = 0;
            pdf.addImage(dataUrl, 'JPEG', imgX, imgY, imgW, imgH);
          }

          const customName = (nupGroupCustomNames[gi] || '').trim();
          const fileName = (customName || group[0].fileName + '_4in1') + '.pdf';
          pdf.save(fileName);
          await new Promise(r => setTimeout(r, 0));
        }

        nupProgressBar.style.width = '100%';
        nupProgressLabel.textContent = '完了！';
        showToast(`${numGroups} 件のPDFを生成しました`);

        setTimeout(() => {
          nupProgressEl.style.display = 'none'; nupProgressBar.style.width = '0%';
          nupBtn.disabled = false; nupClearBtn.disabled = false;
        }, 1500);

      } catch (err) {
        nupProgressLabel.textContent = 'エラー: ' + err.message;
        console.error(err);
        nupBtn.disabled = false; nupClearBtn.disabled = false;
      }
    });

    // ── Keyboard shortcuts (organize mode) ───────────────────────

    document.addEventListener('keydown', e => {
      if (organizePanel.style.display === 'none') return;
      if (e.key === 'Escape') { orgSelected.clear(); orgRender(); }
      if ((e.key === 'Delete' || e.key === 'Backspace') && orgSelected.size > 0 && document.activeElement.tagName !== 'INPUT') {
        e.preventDefault(); orgDeleteBtn.click();
      }
      if ((e.metaKey || e.ctrlKey) && e.key === 'a') {
        e.preventDefault();
        orgPages.forEach(p => orgSelected.add(p.id));
        orgRender();
      }
    });
  </script>
</body>
</html>
