<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Converter</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f5f5f7;
      color: #1d1d1f;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 20px;
    }

    h1 { font-size: 2rem; font-weight: 700; margin-bottom: 8px; letter-spacing: -0.5px; }

    .subtitle { color: #6e6e73; margin-bottom: 40px; font-size: 0.95rem; }

    .container { width: 100%; max-width: 720px; }

    /* Drop zone */
    #dropzone {
      border: 2px dashed #c7c7cc;
      border-radius: 16px;
      padding: 48px 24px;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
      background: #fff;
      margin-bottom: 20px;
    }
    #dropzone.hover { border-color: #0071e3; background: #f0f6ff; }
    #dropzone .icon { font-size: 2.2rem; margin-bottom: 12px; }
    #dropzone .main-text { font-size: 0.95rem; color: #3a3a3c; margin-bottom: 6px; }
    #dropzone .main-text strong { color: #0071e3; }
    #dropzone .sub-text { font-size: 0.82rem; color: #8e8e93; }
    #dropzone.locked { border-color: #34c759; border-style: solid; }
    #fileInput { display: none; }

    /* Output selector */
    #outputSelector {
      background: #fff;
      border-radius: 12px;
      padding: 16px 20px;
      margin-bottom: 16px;
      display: none;
      align-items: center;
      gap: 16px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
    }
    #outputSelector label.heading {
      font-size: 0.85rem;
      font-weight: 600;
      color: #6e6e73;
      white-space: nowrap;
    }
    .radio-group { display: flex; gap: 10px; flex-wrap: wrap; }
    .radio-group label {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 7px 16px;
      border-radius: 99px;
      border: 1.5px solid #d1d1d6;
      cursor: pointer;
      font-size: 0.9rem;
      font-weight: 500;
      transition: border-color 0.15s, background 0.15s, color 0.15s;
      user-select: none;
    }
    .radio-group input[type="radio"] { display: none; }
    .radio-group input[type="radio"]:checked + span { /* handled via JS */ }
    .radio-group label.selected {
      border-color: #0071e3;
      background: #0071e3;
      color: #fff;
    }

    /* File list */
    #fileList { display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; }

    .file-item {
      background: #fff;
      border-radius: 12px;
      padding: 12px 16px;
      display: flex;
      align-items: center;
      gap: 14px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
      cursor: grab;
      user-select: none;
      transition: box-shadow 0.15s, opacity 0.15s;
    }
    .file-item:active { cursor: grabbing; }
    .file-item.dragging { opacity: 0.4; }
    .file-item.drag-over { box-shadow: 0 0 0 2px #0071e3; }

    .file-thumb {
      width: 48px;
      height: 48px;
      border-radius: 8px;
      background: #f5f5f7;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      flex-shrink: 0;
    }
    .file-thumb img { width: 100%; height: 100%; object-fit: contain; }

    .file-info { flex: 1; min-width: 0; }
    .file-name { font-size: 0.9rem; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .file-size { font-size: 0.78rem; color: #6e6e73; margin-top: 2px; }

    .page-num { font-size: 0.78rem; color: #8e8e93; flex-shrink: 0; }

    .remove-btn {
      background: none;
      border: none;
      color: #8e8e93;
      cursor: pointer;
      font-size: 1.1rem;
      padding: 4px;
      border-radius: 50%;
      line-height: 1;
      transition: color 0.15s, background 0.15s;
      flex-shrink: 0;
    }
    .remove-btn:hover { color: #ff3b30; background: #fff0ef; }

    /* Type badge */
    .type-badge {
      font-size: 0.72rem;
      font-weight: 700;
      padding: 2px 7px;
      border-radius: 4px;
      background: #f5f5f7;
      color: #6e6e73;
      flex-shrink: 0;
      letter-spacing: 0.03em;
    }
    .type-badge.svg { background: #fff3e0; color: #e65100; }
    .type-badge.png { background: #e8f5e9; color: #2e7d32; }
    .type-badge.jpg { background: #e3f2fd; color: #1565c0; }

    /* Actions */
    .actions { display: flex; gap: 12px; align-items: center; margin-bottom: 20px; }

    #convertBtn {
      flex: 1;
      padding: 14px;
      background: #0071e3;
      color: #fff;
      border: none;
      border-radius: 12px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }
    #convertBtn:hover:not(:disabled) { background: #0077ed; }
    #convertBtn:disabled { background: #c7c7cc; cursor: not-allowed; }

    #clearBtn {
      padding: 14px 20px;
      background: #fff;
      color: #ff3b30;
      border: 1.5px solid #ffd7d5;
      border-radius: 12px;
      font-size: 0.95rem;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s;
      white-space: nowrap;
    }
    #clearBtn:hover:not(:disabled) { background: #fff0ef; }
    #clearBtn:disabled { opacity: 0.4; cursor: not-allowed; }

    /* Progress */
    #progress { display: none; }
    .progress-label { font-size: 0.85rem; color: #6e6e73; margin-bottom: 8px; }
    .progress-bar-wrap { background: #e5e5ea; border-radius: 99px; height: 6px; overflow: hidden; }
    .progress-bar { height: 100%; background: #0071e3; border-radius: 99px; width: 0%; transition: width 0.2s; }

    /* Toast */
    #toast {
      position: fixed;
      bottom: 32px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: #1d1d1f;
      color: #fff;
      padding: 10px 20px;
      border-radius: 99px;
      font-size: 0.88rem;
      opacity: 0;
      transition: opacity 0.2s, transform 0.2s;
      pointer-events: none;
      white-space: nowrap;
    }
    #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  </style>
</head>
<body>
  <div class="container">
    <h1>Converter</h1>
    <p class="subtitle">SVG・PNG・JPGをドラッグして変換。ドラッグで順序を変更できます。</p>

    <div id="dropzone">
      <div class="icon">📂</div>
      <p class="main-text"><strong id="selectLink">ファイルを選択</strong>　またはここにドロップ</p>
      <p class="sub-text" id="dropSubText">SVG・PNG・JPG に対応</p>
    </div>
    <input type="file" id="fileInput" accept=".svg,.png,.jpg,.jpeg,image/svg+xml,image/png,image/jpeg" multiple>

    <div id="outputSelector">
      <label class="heading">出力形式</label>
      <div class="radio-group" id="radioGroup"></div>
    </div>

    <div id="fileList"></div>

    <div class="actions">
      <button id="convertBtn" disabled>変換する</button>
      <button id="clearBtn" disabled>すべて削除</button>
    </div>

    <div id="progress">
      <p class="progress-label" id="progressLabel">変換中...</p>
      <div class="progress-bar-wrap">
        <div class="progress-bar" id="progressBar"></div>
      </div>
    </div>
  </div>

  <div id="toast"></div>

  <script>
    const { jsPDF } = window.jspdf;

    // Output options per input type (first item = default)
    const OUTPUT_MAP = {
      svg: ['PNG', 'PDF'],
      png: ['JPG', 'PDF'],
      jpg: ['PNG', 'PDF'],
    };

    const TYPE_ACCEPT = {
      svg: '.svg,image/svg+xml',
      png: '.png,image/png',
      jpg: '.jpg,.jpeg,image/jpeg',
    };

    const TYPE_LABEL = { svg: 'SVG', png: 'PNG', jpg: 'JPG' };

    let files = [];
    let lockedType = null;
    let selectedOutput = null;
    let idCounter = 0;
    let dragSrcId = null;

    const dropzone = document.getElementById('dropzone');
    const fileInput = document.getElementById('fileInput');
    const outputSelector = document.getElementById('outputSelector');
    const radioGroup = document.getElementById('radioGroup');
    const fileList = document.getElementById('fileList');
    const convertBtn = document.getElementById('convertBtn');
    const clearBtn = document.getElementById('clearBtn');
    const progress = document.getElementById('progress');
    const progressBar = document.getElementById('progressBar');
    const progressLabel = document.getElementById('progressLabel');
    const dropSubText = document.getElementById('dropSubText');
    const selectLink = document.getElementById('selectLink');
    const toast = document.getElementById('toast');

    function showToast(msg) {
      toast.textContent = msg;
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 2500);
    }

    function getFileType(file) {
      const ext = file.name.split('.').pop().toLowerCase();
      const mime = file.type;
      if (ext === 'svg' || mime === 'image/svg+xml') return 'svg';
      if (ext === 'png' || mime === 'image/png') return 'png';
      if (ext === 'jpg' || ext === 'jpeg' || mime === 'image/jpeg') return 'jpg';
      return null;
    }

    async function readFileData(file, type) {
      if (type === 'svg') {
        const content = await file.text();
        const blob = new Blob([content], { type: 'image/svg+xml' });
        return { content, blobUrl: URL.createObjectURL(blob) };
      }
      const dataUrl = await new Promise(resolve => {
        const r = new FileReader();
        r.onload = e => resolve(e.target.result);
        r.readAsDataURL(file);
      });
      return { dataUrl, blobUrl: dataUrl };
    }

    async function addFiles(rawFiles) {
      const valid = [];
      let skipped = 0;

      for (const f of rawFiles) {
        const t = getFileType(f);
        if (!t) { skipped++; continue; }
        if (lockedType && t !== lockedType) { skipped++; continue; }
        if (!lockedType) {
          lockedType = t;
          selectedOutput = OUTPUT_MAP[t][0];
          updateFileInput();
        }
        valid.push({ file: f, type: t });
      }

      for (const { file, type } of valid) {
        const data = await readFileData(file, type);
        files.push({ id: idCounter++, name: file.name, size: file.size, type, ...data });
      }

      if (skipped > 0) {
        showToast(`${skipped}件のファイルをスキップしました（${TYPE_LABEL[lockedType] || '対応外'}以外は混在不可）`);
      }

      render();
    }

    function updateFileInput() {
      fileInput.accept = lockedType ? TYPE_ACCEPT[lockedType] : '.svg,.png,.jpg,.jpeg,image/svg+xml,image/png,image/jpeg';
    }

    function renderOutputSelector() {
      if (!lockedType) {
        outputSelector.style.display = 'none';
        return;
      }
      outputSelector.style.display = 'flex';
      radioGroup.innerHTML = '';
      OUTPUT_MAP[lockedType].forEach(fmt => {
        const lbl = document.createElement('label');
        lbl.className = 'radio-group-label' + (fmt === selectedOutput ? ' selected' : '');
        lbl.dataset.fmt = fmt;
        lbl.innerHTML = `<input type="radio" name="output" value="${fmt}"${fmt === selectedOutput ? ' checked' : ''}><span>${fmt}</span>`;
        lbl.addEventListener('click', () => {
          selectedOutput = fmt;
          document.querySelectorAll('.radio-group label').forEach(el => el.classList.remove('selected'));
          lbl.classList.add('selected');
        });
        radioGroup.appendChild(lbl);
      });
    }

    function render() {
      const hasFiles = files.length > 0;

      // Dropzone hint
      if (lockedType) {
        dropzone.classList.add('locked');
        dropSubText.textContent = `${TYPE_LABEL[lockedType]}ファイルのみ追加できます`;
      } else {
        dropzone.classList.remove('locked');
        dropSubText.textContent = 'SVG・PNG・JPG に対応';
      }

      // Output selector
      renderOutputSelector();

      // File list
      fileList.innerHTML = '';
      files.forEach((file, index) => {
        const item = document.createElement('div');
        item.className = 'file-item';
        item.draggable = true;
        item.dataset.id = file.id;

        item.innerHTML = `
          <div class="file-thumb">
            <img src="${file.blobUrl}" alt="">
          </div>
          <div class="file-info">
            <div class="file-name">${escHtml(file.name)}</div>
            <div class="file-size">${formatSize(file.size)}</div>
          </div>
          <span class="type-badge ${file.type}">${file.type.toUpperCase()}</span>
          <span class="page-num">#${index + 1}</span>
          <button class="remove-btn" title="削除">×</button>
        `;

        item.querySelector('.remove-btn').addEventListener('click', () => {
          if (file.type === 'svg') URL.revokeObjectURL(file.blobUrl);
          files = files.filter(f => f.id !== file.id);
          if (files.length === 0) {
            lockedType = null;
            selectedOutput = null;
            updateFileInput();
          }
          render();
        });

        setupDrag(item);
        fileList.appendChild(item);
      });

      convertBtn.disabled = !hasFiles;
      clearBtn.disabled = !hasFiles;
    }

    // Drag-to-reorder
    function setupDrag(item) {
      item.addEventListener('dragstart', e => {
        dragSrcId = parseInt(item.dataset.id);
        item.classList.add('dragging');
        e.dataTransfer.effectAllowed = 'move';
      });
      item.addEventListener('dragend', () => item.classList.remove('dragging'));
      item.addEventListener('dragover', e => {
        e.preventDefault();
        e.dataTransfer.dropEffect = 'move';
        document.querySelectorAll('.file-item').forEach(el => el.classList.remove('drag-over'));
        item.classList.add('drag-over');
      });
      item.addEventListener('dragleave', () => item.classList.remove('drag-over'));
      item.addEventListener('drop', e => {
        e.preventDefault();
        item.classList.remove('drag-over');
        const targetId = parseInt(item.dataset.id);
        if (dragSrcId === targetId) return;
        const si = files.findIndex(f => f.id === dragSrcId);
        const ti = files.findIndex(f => f.id === targetId);
        const [moved] = files.splice(si, 1);
        files.splice(ti, 0, moved);
        render();
      });
    }

    // Drop zone events
    dropzone.addEventListener('dragover', e => { e.preventDefault(); dropzone.classList.add('hover'); });
    dropzone.addEventListener('dragleave', () => dropzone.classList.remove('hover'));
    dropzone.addEventListener('drop', async e => {
      e.preventDefault();
      dropzone.classList.remove('hover');
      await addFiles([...e.dataTransfer.files]);
    });
    dropzone.addEventListener('click', e => {
      if (e.target !== selectLink && !selectLink.contains(e.target)) fileInput.click();
    });
    selectLink.addEventListener('click', e => { e.stopPropagation(); fileInput.click(); });
    fileInput.addEventListener('change', async () => {
      await addFiles([...fileInput.files]);
      fileInput.value = '';
    });

    clearBtn.addEventListener('click', () => {
      files.forEach(f => { if (f.type === 'svg') URL.revokeObjectURL(f.blobUrl); });
      files = [];
      lockedType = null;
      selectedOutput = null;
      updateFileInput();
      render();
    });

    // ─── Conversion helpers ───────────────────────────────────────

    function getSvgDimensions(svgContent) {
      const doc = new DOMParser().parseFromString(svgContent, 'image/svg+xml');
      const svg = doc.querySelector('svg');
      if (!svg) return { width: 800, height: 600 };
      let w = parseFloat(svg.getAttribute('width'));
      let h = parseFloat(svg.getAttribute('height'));
      if (!w || !h) {
        const vb = svg.getAttribute('viewBox');
        if (vb) {
          const p = vb.trim().split(/[\s,]+/);
          w = parseFloat(p[2]); h = parseFloat(p[3]);
        }
      }
      return (w && h) ? { width: w, height: h } : { width: 800, height: 600 };
    }

    async function svgToCanvas(svgContent, width, height, scale = 2) {
      const canvas = document.createElement('canvas');
      canvas.width = width * scale;
      canvas.height = height * scale;
      const ctx = canvas.getContext('2d');
      ctx.scale(scale, scale);
      const blob = new Blob([svgContent], { type: 'image/svg+xml;charset=utf-8' });
      const url = URL.createObjectURL(blob);
      await new Promise((resolve, reject) => {
        const img = new Image();
        img.onload = () => { ctx.drawImage(img, 0, 0, width, height); resolve(); };
        img.onerror = reject;
        img.src = url;
      });
      URL.revokeObjectURL(url);
      return canvas;
    }

    async function imageUrlToCanvas(src, outputMime) {
      const img = new Image();
      await new Promise((resolve, reject) => {
        img.onload = resolve; img.onerror = reject;
        img.crossOrigin = 'anonymous';
        img.src = src;
      });
      const canvas = document.createElement('canvas');
      canvas.width = img.naturalWidth;
      canvas.height = img.naturalHeight;
      const ctx = canvas.getContext('2d');
      if (outputMime === 'image/jpeg') {
        ctx.fillStyle = '#ffffff';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
      }
      ctx.drawImage(img, 0, 0);
      return canvas;
    }

    async function canvasToBlob(canvas, mime, quality = 0.92) {
      return new Promise(resolve => canvas.toBlob(resolve, mime, quality));
    }

    function downloadBlob(blob, filename) {
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url; a.download = filename; a.click();
      setTimeout(() => URL.revokeObjectURL(url), 1000);
    }

    function dateSuffix() {
      return new Date().toISOString().slice(0, 10);
    }

    // ─── Main export ──────────────────────────────────────────────

    convertBtn.addEventListener('click', async () => {
      if (!files.length || !selectedOutput) return;
      convertBtn.disabled = true;
      clearBtn.disabled = true;
      progress.style.display = 'block';
      progressBar.style.width = '0%';

      try {
        const out = selectedOutput.toLowerCase(); // 'pdf' | 'png' | 'jpg'
        const inp = lockedType;                    // 'svg' | 'png' | 'jpg'

        if (out === 'pdf') {
          await convertToPdf(inp);
        } else {
          await convertToImages(inp, out);
        }

        progressBar.style.width = '100%';
        progressLabel.textContent = '完了！';
        showToast('変換完了しました');

        setTimeout(() => {
          progress.style.display = 'none';
          progressBar.style.width = '0%';
          convertBtn.disabled = false;
          clearBtn.disabled = false;
        }, 1500);

      } catch (err) {
        progressLabel.textContent = 'エラー: ' + err.message;
        console.error(err);
        convertBtn.disabled = false;
        clearBtn.disabled = false;
      }
    });

    async function convertToPdf(inputType) {
      const A4_W = 595.28, A4_H = 841.89;
      let pdf = null;

      for (let i = 0; i < files.length; i++) {
        const file = files[i];
        progressLabel.textContent = `PDF変換中... ${i + 1} / ${files.length}`;
        progressBar.style.width = `${(i / files.length) * 100}%`;

        let dataUrl, pageW, pageH;

        if (inputType === 'svg') {
          const { width, height } = getSvgDimensions(file.content);
          const canvas = await svgToCanvas(file.content, width, height);
          dataUrl = canvas.toDataURL('image/png');
          pageW = width; pageH = height;

          if (i === 0) {
            pdf = new jsPDF({ orientation: width > height ? 'l' : 'p', unit: 'pt', format: [width, height] });
          } else {
            pdf.addPage([width, height], width > height ? 'l' : 'p');
          }
          pdf.addImage(dataUrl, 'PNG', 0, 0, pageW, pageH);

        } else {
          // PNG / JPG → fit to A4
          const img = new Image();
          await new Promise((resolve, reject) => {
            img.onload = resolve; img.onerror = reject;
            img.src = file.blobUrl;
          });
          const ratio = Math.min(A4_W / img.naturalWidth, A4_H / img.naturalHeight);
          const w = img.naturalWidth * ratio;
          const h = img.naturalHeight * ratio;
          const x = (A4_W - w) / 2;
          const y = (A4_H - h) / 2;
          const fmt = inputType === 'png' ? 'PNG' : 'JPEG';

          if (i === 0) {
            pdf = new jsPDF({ unit: 'pt', format: 'a4' });
          } else {
            pdf.addPage('a4');
          }
          pdf.addImage(file.blobUrl, fmt, x, y, w, h);
        }
      }

      pdf.save(`converter-${dateSuffix()}.pdf`);
    }

    async function convertToImages(inputType, outputExt) {
      const mime = outputExt === 'jpg' ? 'image/jpeg' : 'image/png';
      const results = []; // { name, blob }

      for (let i = 0; i < files.length; i++) {
        const file = files[i];
        progressLabel.textContent = `画像変換中... ${i + 1} / ${files.length}`;
        progressBar.style.width = `${(i / files.length) * 100}%`;

        let canvas;
        if (inputType === 'svg') {
          const { width, height } = getSvgDimensions(file.content);
          canvas = await svgToCanvas(file.content, width, height);
        } else {
          canvas = await imageUrlToCanvas(file.blobUrl, mime);
        }

        const blob = await canvasToBlob(canvas, mime);
        const baseName = file.name.replace(/\.[^.]+$/, '');
        results.push({ name: `${baseName}.${outputExt}`, blob });
      }

      if (results.length === 1) {
        downloadBlob(results[0].blob, results[0].name);
      } else {
        progressLabel.textContent = 'ZIPを作成中...';
        const zip = new JSZip();
        results.forEach(r => zip.file(r.name, r.blob));
        const zipBlob = await zip.generateAsync({ type: 'blob' });
        downloadBlob(zipBlob, `converter-${dateSuffix()}.zip`);
      }
    }

    // ─── Utilities ───────────────────────────────────────────────

    function formatSize(bytes) {
      if (bytes < 1024) return bytes + ' B';
      if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
      return (bytes / 1024 / 1024).toFixed(1) + ' MB';
    }

    function escHtml(str) {
      return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    render();
  </script>
</body>
</html>
