<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SVG → PDF</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f5f5f7;
      color: #1d1d1f;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 20px;
    }

    h1 {
      font-size: 2rem;
      font-weight: 700;
      margin-bottom: 8px;
      letter-spacing: -0.5px;
    }

    .subtitle {
      color: #6e6e73;
      margin-bottom: 40px;
      font-size: 0.95rem;
    }

    .container {
      width: 100%;
      max-width: 720px;
    }

    /* Drop zone */
    #dropzone {
      border: 2px dashed #c7c7cc;
      border-radius: 16px;
      padding: 56px 24px;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
      background: #fff;
      margin-bottom: 24px;
    }

    #dropzone.hover {
      border-color: #0071e3;
      background: #f0f6ff;
    }

    #dropzone .icon {
      font-size: 2.5rem;
      margin-bottom: 12px;
    }

    #dropzone p {
      color: #6e6e73;
      font-size: 0.95rem;
      line-height: 1.6;
    }

    #dropzone strong {
      color: #0071e3;
      cursor: pointer;
    }

    #fileInput { display: none; }

    /* File list */
    #fileList {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-bottom: 24px;
    }

    .file-item {
      background: #fff;
      border-radius: 12px;
      padding: 12px 16px;
      display: flex;
      align-items: center;
      gap: 14px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
      cursor: grab;
      user-select: none;
      transition: box-shadow 0.15s, opacity 0.15s;
    }

    .file-item:active { cursor: grabbing; }
    .file-item.dragging { opacity: 0.4; }
    .file-item.drag-over { box-shadow: 0 0 0 2px #0071e3; }

    .file-thumb {
      width: 48px;
      height: 48px;
      border-radius: 8px;
      background: #f5f5f7;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      flex-shrink: 0;
    }

    .file-thumb img {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    .file-info {
      flex: 1;
      min-width: 0;
    }

    .file-name {
      font-size: 0.9rem;
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .file-size {
      font-size: 0.78rem;
      color: #6e6e73;
      margin-top: 2px;
    }

    .page-num {
      font-size: 0.78rem;
      color: #8e8e93;
      flex-shrink: 0;
    }

    .remove-btn {
      background: none;
      border: none;
      color: #8e8e93;
      cursor: pointer;
      font-size: 1.1rem;
      padding: 4px;
      border-radius: 50%;
      line-height: 1;
      transition: color 0.15s, background 0.15s;
      flex-shrink: 0;
    }

    .remove-btn:hover {
      color: #ff3b30;
      background: #fff0ef;
    }

    /* Actions */
    .actions {
      display: flex;
      gap: 12px;
      align-items: center;
    }

    #exportBtn {
      flex: 1;
      padding: 14px;
      background: #0071e3;
      color: #fff;
      border: none;
      border-radius: 12px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }

    #exportBtn:hover:not(:disabled) { background: #0077ed; }
    #exportBtn:disabled { background: #c7c7cc; cursor: not-allowed; }

    #clearBtn {
      padding: 14px 20px;
      background: #fff;
      color: #ff3b30;
      border: 1.5px solid #ffd7d5;
      border-radius: 12px;
      font-size: 0.95rem;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s;
      white-space: nowrap;
    }

    #clearBtn:hover { background: #fff0ef; }
    #clearBtn:disabled { opacity: 0.4; cursor: not-allowed; }

    /* Progress */
    #progress {
      margin-top: 20px;
      display: none;
    }

    .progress-bar-wrap {
      background: #e5e5ea;
      border-radius: 99px;
      height: 6px;
      overflow: hidden;
      margin-top: 8px;
    }

    .progress-bar {
      height: 100%;
      background: #0071e3;
      border-radius: 99px;
      width: 0%;
      transition: width 0.2s;
    }

    .progress-label {
      font-size: 0.85rem;
      color: #6e6e73;
    }

    /* Empty state */
    #emptyHint {
      text-align: center;
      color: #8e8e93;
      font-size: 0.85rem;
      padding: 8px 0 16px;
      display: none;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>SVG → PDF</h1>
    <p class="subtitle">SVGファイルをまとめてPDFに変換。ドラッグで順序を変更できます。</p>

    <div id="dropzone">
      <div class="icon">📄</div>
      <p><strong onclick="document.getElementById('fileInput').click()">ファイルを選択</strong>　またはここにドロップ</p>
      <p style="margin-top:6px;font-size:0.82rem;">SVGファイル（複数可）</p>
    </div>
    <input type="file" id="fileInput" accept=".svg,image/svg+xml" multiple>

    <div id="fileList"></div>
    <p id="emptyHint">SVGファイルを追加してください</p>

    <div class="actions">
      <button id="exportBtn" disabled>PDFを生成</button>
      <button id="clearBtn" disabled>すべて削除</button>
    </div>

    <div id="progress">
      <p class="progress-label" id="progressLabel">変換中...</p>
      <div class="progress-bar-wrap">
        <div class="progress-bar" id="progressBar"></div>
      </div>
    </div>
  </div>

  <script>
    const { jsPDF } = window.jspdf;

    let files = []; // { id, name, size, content, blobUrl }
    let idCounter = 0;

    const dropzone = document.getElementById('dropzone');
    const fileInput = document.getElementById('fileInput');
    const fileList = document.getElementById('fileList');
    const exportBtn = document.getElementById('exportBtn');
    const clearBtn = document.getElementById('clearBtn');
    const progress = document.getElementById('progress');
    const progressBar = document.getElementById('progressBar');
    const progressLabel = document.getElementById('progressLabel');
    const emptyHint = document.getElementById('emptyHint');

    // Drop zone events
    dropzone.addEventListener('dragover', e => { e.preventDefault(); dropzone.classList.add('hover'); });
    dropzone.addEventListener('dragleave', () => dropzone.classList.remove('hover'));
    dropzone.addEventListener('drop', e => {
      e.preventDefault();
      dropzone.classList.remove('hover');
      addFiles([...e.dataTransfer.files].filter(f => f.type === 'image/svg+xml' || f.name.endsWith('.svg')));
    });
    dropzone.addEventListener('click', e => {
      if (e.target.tagName !== 'STRONG') fileInput.click();
    });
    fileInput.addEventListener('change', () => {
      addFiles([...fileInput.files]);
      fileInput.value = '';
    });

    async function addFiles(newFiles) {
      for (const f of newFiles) {
        const content = await f.text();
        const blob = new Blob([content], { type: 'image/svg+xml' });
        const blobUrl = URL.createObjectURL(blob);
        files.push({ id: idCounter++, name: f.name, size: f.size, content, blobUrl });
      }
      render();
    }

    function render() {
      fileList.innerHTML = '';
      const hasFiles = files.length > 0;
      exportBtn.disabled = !hasFiles;
      clearBtn.disabled = !hasFiles;
      emptyHint.style.display = 'none';

      files.forEach((file, index) => {
        const item = document.createElement('div');
        item.className = 'file-item';
        item.draggable = true;
        item.dataset.id = file.id;

        item.innerHTML = `
          <div class="file-thumb">
            <img src="${file.blobUrl}" alt="">
          </div>
          <div class="file-info">
            <div class="file-name">${escHtml(file.name)}</div>
            <div class="file-size">${formatSize(file.size)}</div>
          </div>
          <span class="page-num">P${index + 1}</span>
          <button class="remove-btn" title="削除">×</button>
        `;

        item.querySelector('.remove-btn').addEventListener('click', () => {
          URL.revokeObjectURL(file.blobUrl);
          files = files.filter(f => f.id !== file.id);
          render();
        });

        setupDrag(item);
        fileList.appendChild(item);
      });
    }

    // Drag-to-reorder
    let dragSrcId = null;

    function setupDrag(item) {
      item.addEventListener('dragstart', e => {
        dragSrcId = parseInt(item.dataset.id);
        item.classList.add('dragging');
        e.dataTransfer.effectAllowed = 'move';
      });
      item.addEventListener('dragend', () => item.classList.remove('dragging'));
      item.addEventListener('dragover', e => {
        e.preventDefault();
        e.dataTransfer.dropEffect = 'move';
        document.querySelectorAll('.file-item').forEach(el => el.classList.remove('drag-over'));
        item.classList.add('drag-over');
      });
      item.addEventListener('dragleave', () => item.classList.remove('drag-over'));
      item.addEventListener('drop', e => {
        e.preventDefault();
        item.classList.remove('drag-over');
        const targetId = parseInt(item.dataset.id);
        if (dragSrcId === targetId) return;
        const srcIdx = files.findIndex(f => f.id === dragSrcId);
        const tgtIdx = files.findIndex(f => f.id === targetId);
        const [moved] = files.splice(srcIdx, 1);
        files.splice(tgtIdx, 0, moved);
        render();
      });
    }

    clearBtn.addEventListener('click', () => {
      files.forEach(f => URL.revokeObjectURL(f.blobUrl));
      files = [];
      render();
    });

    // SVG dimensions helper
    function getSvgDimensions(svgContent) {
      const parser = new DOMParser();
      const doc = parser.parseFromString(svgContent, 'image/svg+xml');
      const svg = doc.querySelector('svg');
      if (!svg) return { width: 595, height: 842 };

      let w = parseFloat(svg.getAttribute('width'));
      let h = parseFloat(svg.getAttribute('height'));

      if (!w || !h) {
        const vb = svg.getAttribute('viewBox');
        if (vb) {
          const parts = vb.trim().split(/[\s,]+/);
          w = parseFloat(parts[2]);
          h = parseFloat(parts[3]);
        }
      }

      if (!w || !h) return { width: 595, height: 842 };
      return { width: w, height: h };
    }

    async function svgToDataUrl(svgContent, width, height) {
      const SCALE = 2;
      const canvas = document.createElement('canvas');
      canvas.width = width * SCALE;
      canvas.height = height * SCALE;
      const ctx = canvas.getContext('2d');
      ctx.scale(SCALE, SCALE);

      const blob = new Blob([svgContent], { type: 'image/svg+xml;charset=utf-8' });
      const url = URL.createObjectURL(blob);

      await new Promise((resolve, reject) => {
        const img = new Image();
        img.onload = () => { ctx.drawImage(img, 0, 0, width, height); resolve(); };
        img.onerror = reject;
        img.src = url;
      });

      URL.revokeObjectURL(url);
      return canvas.toDataURL('image/png');
    }

    exportBtn.addEventListener('click', async () => {
      if (!files.length) return;

      exportBtn.disabled = true;
      clearBtn.disabled = true;
      progress.style.display = 'block';

      try {
        let pdf = null;

        for (let i = 0; i < files.length; i++) {
          const file = files[i];
          progressLabel.textContent = `変換中... ${i + 1} / ${files.length}`;
          progressBar.style.width = `${((i) / files.length) * 100}%`;

          const { width, height } = getSvgDimensions(file.content);
          const orientation = width > height ? 'l' : 'p';
          const dataUrl = await svgToDataUrl(file.content, width, height);

          if (i === 0) {
            pdf = new jsPDF({ orientation, unit: 'pt', format: [width, height] });
          } else {
            pdf.addPage([width, height], orientation);
          }

          pdf.addImage(dataUrl, 'PNG', 0, 0, width, height);
        }

        progressBar.style.width = '100%';
        progressLabel.textContent = '完了！';

        const timestamp = new Date().toISOString().slice(0, 10);
        pdf.save(`svg-export-${timestamp}.pdf`);

        setTimeout(() => {
          progress.style.display = 'none';
          progressBar.style.width = '0%';
          exportBtn.disabled = false;
          clearBtn.disabled = false;
        }, 1500);

      } catch (err) {
        progressLabel.textContent = 'エラーが発生しました: ' + err.message;
        console.error(err);
        exportBtn.disabled = false;
        clearBtn.disabled = false;
      }
    });

    function formatSize(bytes) {
      if (bytes < 1024) return bytes + ' B';
      if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
      return (bytes / 1024 / 1024).toFixed(1) + ' MB';
    }

    function escHtml(str) {
      return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }
  </script>
</body>
</html>
